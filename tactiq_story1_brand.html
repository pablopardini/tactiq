<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=DM+Sans:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;background:#060810;font-family:'DM Sans',sans-serif}
.canvas{width:1080px;height:1920px;position:relative;background:#060810}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,170,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.03) 1px,transparent 1px);background-size:54px 54px}
.glow-top{position:absolute;width:800px;height:800px;background:radial-gradient(circle,rgba(0,212,170,.15) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%)}
.glow-bot{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(61,158,255,.1) 0%,transparent 65%);bottom:-100px;left:50%;transform:translateX(-50%)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;text-align:center;gap:0}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:80px}
.logo-name{font-family:'Big Shoulders Display',sans-serif;font-size:72px;font-weight:900;letter-spacing:8px;color:#fff}
.tagline{font-size:20px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;font-weight:300}
.divider{width:80px;height:1px;background:rgba(0,212,170,.3);margin:48px auto}
.main-text{font-family:'Big Shoulders Display',sans-serif;font-size:96px;font-weight:900;line-height:.95;color:#fff;margin-bottom:16px;letter-spacing:-1px}
.main-text span{color:#00d4aa}
.sub{font-size:22px;color:rgba(255,255,255,.45);font-weight:300;line-height:1.7;max-width:700px;margin-bottom:80px}
.sports-row{display:flex;gap:24px;margin-bottom:80px}
.sport{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:10px}
.sport-icon{font-size:48px}
.sport-name{font-size:16px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase}
.cta{background:#00d4aa;color:#000;font-size:22px;font-weight:700;padding:22px 60px;border-radius:12px;letter-spacing:1px;margin-bottom:32px}
.url{font-size:18px;color:rgba(255,255,255,.2);letter-spacing:3px}
.side-line{position:absolute;left:0;top:0;width:4px;height:100%;background:linear-gradient(180deg,transparent 10%,#00d4aa 30%,#3d9eff 60%,transparent 90%)}
</style>
</head>
<body>
<div class="canvas">
  <div class="side-line"></div>
  <div class="grid"></div>
  <div class="glow-top"></div>
  <div class="glow-bot"></div>
  <div class="content">
    <div class="logo-wrap">
      <svg width="90" height="90" viewBox="0 0 120 120">
        <polygon points="60,8 104,33 104,83 60,108 16,83 16,33" fill="#00d4aa"/>
        <line x1="60" y1="22" x2="60" y2="94" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
        <line x1="28" y1="40" x2="92" y2="76" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
        <line x1="92" y1="40" x2="28" y2="76" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
        <text x="60" y="70" text-anchor="middle" font-family="Big Shoulders Display,sans-serif" font-size="44" font-weight="900" fill="#000">T</text>
      </svg>
      <div class="logo-name">TACTIQ</div>
      <div class="tagline">Videoanálisis táctico deportivo</div>
    </div>
    <div class="main-text">ANALIZÁ<br>MEJORÁ<br><span>GANÁS</span></div>
    <div class="divider"></div>
    <div class="sub">Informes profesionales con IA para que tu cuerpo técnico tome decisiones basadas en datos reales.</div>
    <div class="sports-row">
      <div class="sport"><div class="sport-icon">🏑</div><div class="sport-name">Hockey</div></div>
      <div class="sport"><div class="sport-icon">⚽</div><div class="sport-name">Fútbol</div></div>
      <div class="sport"><div class="sport-icon">🏀</div><div class="sport-name">Básquet</div></div>
    </div>
    <div class="cta">Solicitar análisis →</div>
    <div class="url">tactiq-analisis.netlify.app</div>
  </div>
</div>
</body>
</html>
