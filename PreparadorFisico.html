<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TactiqForce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F4F0;
    --surface:#FFFFFF;
    --ink:#141F1A;
    --ink-muted:#5B6B62;
    --ink-faint:#8B978F;
    --primary:#153F2B;
    --primary-soft:#1F6F4A;
    --primary-dark:#0E2B1D;
    --accent:#C9E265;
    --accent-ink:#3C4A1B;
    --danger:#C1443A;
    --danger-bg:#FBEAE8;
    --warning:#D98F2B;
    --warning-bg:#FCF1E1;
    --ok-bg:#E9F3E3;
    --border:#DEE2D8;
    --mod-a-bg:#EAF3DE; --mod-a-ink:#3B6D11;
    --mod-b-bg:#FAEEDA; --mod-b-ink:#854F0B;
    --mod-c-bg:#FBEAF0; --mod-c-ink:#993556;
    --mod-d-bg:#E6F1FB; --mod-d-ink:#185FA5;
    --mod-e-bg:#F1EFE8; --mod-e-ink:#5F5E5A;
    --mod-f-bg:#EEEDFE; --mod-f-ink:#534AB7;
    --radius:14px;
    --shadow:0 1px 2px rgba(14,43,29,0.06), 0 6px 18px rgba(14,43,29,0.07);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:76px;
  }
  h1,h2,h3,.headline{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    letter-spacing:0.01em;
    margin:0;
  }
  .eyebrow{
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-faint);
  }
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--primary-dark);
    color:#fff;
    padding:14px 18px 16px;
    position:sticky;top:0;z-index:20;
    border-bottom:2px solid var(--accent);
  }
  .topbar .brand{
    display:flex;align-items:center;gap:9px;
  }
  .topbar .brand .logomark{width:24px;height:24px;flex:none;}
  .topbar .brand .title{
    font-family:'Barlow Condensed',sans-serif;
    font-size:22px;font-weight:700;letter-spacing:0.02em;
    color:#fff;
  }
  .topbar .brand .tag{
    font-size:11px;color:var(--accent);
    font-family:'Barlow Condensed',sans-serif;
    letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
    margin-left:34px;
  }
  .sync-pill{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11px;color:rgba(255,255,255,0.75);
    margin-top:6px;margin-left:34px;cursor:pointer;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);}
  .sync-dot.on{background:var(--accent);}
  .sync-dot.err{background:var(--danger);}

  /* ---------- Scoreboard ---------- */
  .scoreboard{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:14px 16px 0;
  }
  .score-cell{
    background:var(--primary);color:#fff;
    padding:14px 8px;text-align:center;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .score-cell .num{
    font-family:'Barlow Condensed',sans-serif;
    font-size:30px;font-weight:700;color:var(--accent);line-height:1;
  }
  .score-cell .lbl{
    font-size:10.5px;color:rgba(255,255,255,0.8);
    text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;
  }
  .score-cell.alert .num{color:#FFD8D3;}
  .score-cell.alert{background:var(--danger);}

  /* ---------- Layout ---------- */
  .view{max-width:720px;margin:0 auto;padding:16px;}
  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    margin:18px 0 10px;
  }
  .section-head h2{font-size:20px;}
  .btn{
    border:none;border-radius:10px;padding:10px 16px;
    font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:active{background:var(--primary-dark);}
  .btn-accent{background:var(--accent);color:var(--accent-ink);}
  .btn-ghost{background:transparent;color:var(--primary);border:1px solid var(--border);}
  .btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px;}
  .btn-icon{width:38px;height:38px;padding:0;border-radius:10px;justify-content:center;}
  .fab{
    position:fixed;right:18px;bottom:88px;z-index:15;
    width:52px;height:52px;border-radius:16px;
    background:var(--accent);color:var(--accent-ink);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:600;box-shadow:0 6px 18px rgba(22,33,28,0.25);
    border:none;
  }

  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px;margin-bottom:10px;
    box-shadow:var(--shadow);
  }
  .card-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .card-title{font-weight:600;font-size:15px;}
  .card-sub{font-size:12.5px;color:var(--ink-muted);margin-top:2px;}
  .chip{
    display:inline-block;font-size:11px;font-weight:600;
    padding:3px 9px;border-radius:20px;
    background:var(--ok-bg);color:var(--primary-dark);
  }
  .chip.warn{background:var(--warning-bg);color:#8A5A15;}
  .chip.danger{background:var(--danger-bg);color:var(--danger);}
  .chip.muted{background:var(--bg);color:var(--ink-muted);}
  .chip.elite{background:#F1F7DC;color:var(--accent-ink);font-weight:700;}

  .empty{
    text-align:center;padding:40px 20px;color:var(--ink-muted);
  }
  .empty .glyph{font-size:34px;margin-bottom:8px;}
  .empty p{margin:4px 0 14px;font-size:14px;}

  .search{
    width:100%;padding:11px 14px;border-radius:10px;
    border:1px solid var(--border);background:var(--surface);
    font-size:14px;color:var(--ink);margin-bottom:12px;
  }
  .search:focus{outline:2px solid var(--primary);outline-offset:1px;}

  /* ---------- Tabs (bottom nav) ---------- */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:var(--surface);border-top:1px solid var(--border);
    display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--ink-faint);
    padding:6px 2px;border-radius:10px;font-size:10.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.03em;
  }
  .tab.active{color:var(--primary);}
  .tab .ico{font-size:19px;line-height:1;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,33,28,0.5);
    display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface);width:100%;max-width:520px;
    border-radius:18px 18px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    max-height:88vh;overflow-y:auto;
  }
  @media(min-width:640px){
    .modal-overlay{align-items:center;}
    .modal{border-radius:18px;max-height:80vh;}
  }
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .modal-head h3{font-size:20px;}
  .close-x{background:none;border:none;font-size:22px;color:var(--ink-muted);padding:4px;}
  .field{margin-bottom:12px;}
  .field label{
    display:block;font-size:12px;font-weight:600;color:var(--ink-muted);
    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;
  }
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border-radius:9px;
    border:1px solid var(--border);font-size:15px;color:var(--ink);background:var(--surface);
  }
  .field textarea{resize:vertical;min-height:60px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .rpe-scale{display:flex;gap:5px;flex-wrap:wrap;}
  .rpe-btn{
    width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface);font-weight:600;font-size:13px;color:var(--ink-muted);
  }
  .rpe-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary);}
  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .modal-actions .btn{flex:1;justify-content:center;}

  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--primary-dark);color:#fff;padding:10px 18px;
    border-radius:30px;font-size:13px;z-index:60;
    box-shadow:0 6px 18px rgba(22,33,28,0.3);opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .setup-note{
    font-size:12px;color:var(--ink-muted);background:var(--surface);
    border:1px dashed var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;
  }
  .setup-note code{background:var(--bg);padding:1px 5px;border-radius:4px;}

  a{color:var(--primary);}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:2px;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .test-history-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .test-history-item:last-child{border-bottom:none;}

  /* ---------- Selección de deporte ---------- */
  .sport-gate{
    min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px;
  }
  .sport-gate .glyph{font-size:40px;margin-bottom:10px;}
  .sport-gate h2{font-size:24px;margin-bottom:4px;}
  .sport-gate p{color:var(--ink-muted);font-size:14px;margin:0 0 20px;}
  .sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px;}
  .sport-card{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;
    font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--ink);
  }
  .sport-card .ico{font-size:26px;}
  .sport-card.sel{border-color:var(--primary);background:var(--ok-bg);color:var(--primary-dark);}

  /* ---------- Fondo 3D para pantallas de acceso ---------- */
  .gate-3d-wrap{position:relative;overflow:hidden;border-radius:18px;margin:4px 0;background:var(--primary-dark);}
  .gate-3d-bg{position:absolute;inset:0;z-index:0;opacity:0.85;}
  .gate-3d-content{position:relative;z-index:1;}
  .gate-3d-content.sport-gate{min-height:auto;padding:32px 20px;}
  .gate-3d-content .glyph,.gate-3d-content h2{color:#fff;}
  .gate-3d-content p{color:rgba(255,255,255,0.72);}
  .gate-3d-content .field label{color:rgba(255,255,255,0.75);}
  .gate-3d-content .field input,.gate-3d-content .field select{background:rgba(255,255,255,0.94);}
  .gate-3d-content .hint{color:rgba(255,255,255,0.65);}
  .gate-3d-content a{color:var(--accent);}
  .gate-3d-content .sport-card{background:rgba(255,255,255,0.94);}

  /* ---------- Botonera / hub principal ---------- */
  .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
  .hub-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;
    font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--ink);
    box-shadow:var(--shadow);transition:transform .12s ease;
  }
  .hub-card:active{transform:scale(0.97);}
  .hub-ico-badge{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;}

  /* ---------- Botonera de tests ---------- */
  .test-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .test-chip{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:8px 14px;font-size:13px;font-weight:600;color:var(--primary-dark);
    transition:transform .1s ease, background .15s ease;
  }
  .test-chip:active{transform:scale(0.95);}
  .test-chip:hover{background:var(--ok-bg);border-color:var(--primary-soft);}
  .test-chip-otro{background:var(--mod-c-bg);color:var(--mod-c-ink);border-color:transparent;}
  .test-chip-custom{background:var(--mod-f-bg);color:var(--mod-f-ink);border-color:transparent;}
  .test-group-label{
    font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);
    margin:12px 0 6px;
  }
  .test-group-label:first-child{margin-top:0;}
  .test-grid{margin-bottom:6px;}

  /* ---------- Carga matriz ---------- */
  .matriz-toggle{display:flex;gap:6px;margin-bottom:12px;}
  .mtx-tab{
    flex:1;padding:9px;border:1px solid var(--border);border-radius:10px;
    background:var(--surface);font-size:13px;font-weight:600;color:var(--ink-muted);
  }
  .mtx-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .matriz-wrap{max-height:52vh;overflow-y:auto;border:1px solid var(--border);border-radius:12px;margin-bottom:4px;}
  .matriz{width:100%;border-collapse:collapse;font-size:13px;}
  .matriz thead th{
    background:var(--primary);color:#fff;position:sticky;top:0;
    font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
    padding:8px 6px;text-align:center;z-index:1;
  }
  .matriz thead th:first-child{text-align:left;padding-left:10px;}
  .matriz td{padding:5px 6px;border-bottom:1px solid var(--border);}
  .matriz .mtx-label{font-weight:600;font-size:12.5px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis;}
  .matriz tbody tr:last-child td{border-bottom:none;}
  .mtx-in{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;text-align:center;}
  .mtx-in:focus{outline:none;border-color:var(--primary-soft);}
  .mtx-sm{max-width:52px;}
  .mtx-cell{max-width:62px;font-size:13px;}
  .mtx-jug-header{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:52px;}
  .mtx-jug-header span{font-size:10px;font-weight:600;color:#fff;max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mtx-jug-header::before{
    content:attr(data-ini, '');
    width:28px;height:28px;border-radius:50%;background:rgba(201,226,101,0.25);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:11px;color:var(--accent);
  }

  /* ---------- Planilla de progresión ---------- */
  /* ---------- Calendario ---------- */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-nav h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin:0;color:var(--ink);}
  .cal-view-toggle{display:flex;gap:4px;}
  .cal-vtab{padding:5px 12px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:600;background:var(--surface);color:var(--ink-muted);}
  .cal-vtab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px;}
  .cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--ink-faint);padding:4px 0;letter-spacing:.06em;text-transform:uppercase;}
  .cal-day{min-height:52px;border-radius:8px;padding:4px;cursor:pointer;background:var(--surface);border:1px solid transparent;transition:border-color .12s;}
  .cal-day:hover{border-color:var(--primary-soft);}
  .cal-day.today{border-color:var(--accent);background:var(--ok-bg);}
  .cal-day.otro-mes{opacity:0.35;}
  .cal-day.tiene-datos{border-color:var(--border);}
  .cal-day-num{font-size:11px;font-weight:600;color:var(--ink-muted);margin-bottom:2px;}
  .cal-day.today .cal-day-num{color:var(--primary);}
  .cal-dot-row{display:flex;flex-wrap:wrap;gap:2px;}
  .cal-dot{width:6px;height:6px;border-radius:50%;}
  .cal-dot-carga{background:#C9E265;}
  .cal-dot-test{background:#9F7AEA;}
  .cal-dot-gym{background:#63B3ED;}
  .cal-dot-plan{background:#F6AD55;}
  .cal-dot-nota{background:#FC8181;}
  .cal-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .cal-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-muted);}
  /* semana */
  .cal-week{display:grid;grid-template-columns:48px repeat(7,1fr);gap:0;}
  .cal-week-col{border-left:1px solid var(--border);}
  .cal-week-col:first-child{border-left:none;}
  .cal-week-day-head{text-align:center;padding:6px 2px;font-size:11px;font-weight:600;color:var(--ink-muted);border-bottom:1px solid var(--border);}
  .cal-week-day-head.today{color:var(--primary);background:var(--ok-bg);}
  .cal-week-time{font-size:10px;color:var(--ink-faint);text-align:right;padding:2px 4px 0 0;}
  .cal-week-cell{min-height:38px;padding:3px;border-bottom:1px solid var(--border);cursor:pointer;}
  .cal-week-cell:hover{background:var(--ok-bg);}
  .cal-event{font-size:10px;border-radius:4px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-ev-carga{background:#E9F3E3;color:#3B6D11;}
  .cal-ev-test{background:#EEEDFE;color:#534AB7;}
  .cal-ev-gym{background:#E6F1FB;color:#185FA5;}
  .cal-ev-plan{background:#FAEEDA;color:#854F0B;}
  .cal-ev-nota{background:#FBEAE8;color:#C1443A;}

  .planilla-wrap{
    margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    border:1px solid var(--border);border-radius:12px;background:var(--surface);
  }
  .planilla{border-collapse:collapse;width:100%;font-size:12.5px;white-space:nowrap;}
  .planilla th,.planilla td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);}
  .planilla thead th{
    background:var(--primary);color:#fff;font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:12px;position:sticky;top:0;
  }
  .planilla .pl-fecha{
    text-align:left;font-weight:600;position:sticky;left:0;
    background:var(--ok-bg);color:var(--primary-dark);
  }
  .planilla thead .pl-fecha{background:var(--primary-dark);color:#fff;z-index:1;}
  .planilla tbody tr:last-child td{border-bottom:none;}
  .planilla .pl-empty{color:var(--ink-faint);}
  .badge-a{background:var(--mod-a-bg);} .badge-b{background:var(--mod-b-bg);} .badge-c{background:var(--mod-c-bg);}
  .badge-d{background:var(--mod-d-bg);} .badge-e{background:var(--mod-e-bg);} .badge-f{background:var(--mod-f-bg);}

  /* ---------- Avatares e íconos de lista ---------- */
  .avatar{
    width:40px;height:40px;border-radius:50%;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
    background:var(--mod-a-bg);color:var(--mod-a-ink);
  }
  .row-icon{
    width:36px;height:36px;border-radius:10px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .card-row-avatar{display:flex;align-items:center;gap:12px;}
  .empty .glyph-badge{
    width:76px;height:76px;border-radius:50%;background:var(--ok-bg);
    display:flex;align-items:center;justify-content:center;font-size:34px;
    margin:0 auto 12px;
  }
  .tab-count-6 .tab{font-size:9.5px;padding:5px 1px;}
  .tab-count-6 .tab .ico{font-size:17px;}
  .tab-count-7 .tab{font-size:9px;padding:5px 0;}
  .tab-count-7 .tab .ico{font-size:16px;}
  .tab-count-8 .tab{font-size:8.5px;padding:5px 0;}
  .tab-count-8 .tab .ico{font-size:15px;}

  /* ---------- Transiciones y efectos ---------- */
  @keyframes pfFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .view.fade-enter{animation:pfFadeIn 0.28s ease;}
  .btn{transition:transform .12s ease, background .15s ease;}

<script>
/* =========================================================
   PREPARADOR FÍSICO — app single-file
   Persistencia local (localStorage) + sync opcional a Firebase
   ========================================================= */

const LS_KEYS = { jugadoras:'pf_jugadoras', cargas:'pf_cargas', evaluaciones:'pf_evaluaciones', gimnasio:'pf_gimnasio', config:'pf_config', planes:'pf_planes', notas:'pf_notas' };

const DEPORTES = [
  { id:'hockey',   label:'Hockey',    ico:'&#127939;' },
  { id:'futbol',   label:'Fútbol',    ico:'&#9917;'   },
  { id:'basquet',  label:'Básquet',   ico:'&#127936;' },
  { id:'voley',    label:'Voley',     ico:'&#127944;' },
  { id:'handball', label:'Handball',  ico:'&#129336;' },
  { id:'rugby',    label:'Rugby',     ico:'&#127945;' }
];
function deporteInfo(id){ return DEPORTES.find(d=>d.id===id); }

const EJERCICIOS_GRUPOS = [
  { grupo:'Tren inferior', items:['Sentadilla','Sentadilla frontal','Sentadilla búlgara','Prensa','Peso muerto','Peso muerto rumano','Hip thrust','Zancadas','Zancadas caminando','Estocadas','Estocada lateral','Extensión de cuádriceps','Curl femoral','Elevación de gemelos'] },
  { grupo:'Empujes (tren superior)', items:['Press banca','Press banca inclinado','Press militar','Press con mancuernas','Press Arnold','Fondos (dips)','Aperturas','Extensión de tríceps','Press francés'] },
  { grupo:'Tracciones (tren superior)', items:['Dominadas','Dominadas lastradas','Remo con barra','Remo con mancuerna','Remo en polea','Jalón al pecho','Face pull','Curl de bíceps','Curl martillo','Curl con barra'] },
  { grupo:'Olímpicos / potencia', items:['Snatch (arranque)','Clean (cargada)','Clean and jerk','Power clean','Push press','Cargada colgante','Envión'] },
  { grupo:'Core', items:['Plancha','Plancha lateral','Abdominales','Elevación de piernas','Russian twist','Rueda abdominal','Pallof press'] },
  { grupo:'Otro', items:['Otro'] }
];
const EJERCICIOS_GYM = EJERCICIOS_GRUPOS.flatMap(g=>g.items);
function normalizarNombre(s){
  return String(s||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,''); // saca acentos
}
function listaEjercicios(){
  const base = EJERCICIOS_GYM.filter(e=>e!=='Otro');
  const baseNorm = base.map(normalizarNombre);
  const custom = (state.config.ejerciciosCustom||[]).filter(e=>!baseNorm.includes(normalizarNombre(e)));
  return base.concat(custom).concat(['Otro']);
}
/* Opciones agrupadas (optgroup) para el select del formulario de gimnasio. */
function ejerciciosOptgroupsHtml(seleccionado){
  const baseNorm = EJERCICIOS_GRUPOS.flatMap(g=>g.items).map(normalizarNombre);
  const custom = (state.config.ejerciciosCustom||[]).filter(e=>!baseNorm.includes(normalizarNombre(e)));
  let html = EJERCICIOS_GRUPOS.filter(g=>g.grupo!=='Otro').map(g=>
    `<optgroup label="${esc(g.grupo)}">${g.items.map(ex=>`<option value="${esc(ex)}" ${seleccionado===ex?'selected':''}>${esc(ex)}</option>`).join('')}</optgroup>`
  ).join('');
  if(custom.length){
    html += `<optgroup label="Personalizados">${custom.map(ex=>`<option value="${esc(ex)}" ${seleccionado===ex?'selected':''}>${esc(ex)}</option>`).join('')}</optgroup>`;
  }
  html += `<optgroup label="Otro"><option value="Otro" ${seleccionado==='Otro'?'selected':''}>Otro (escribir nuevo)</option></optgroup>`;
  return html;
}
function listaCategorias(){
  return [...new Set(state.jugadoras.map(j=>j.categoria).filter(Boolean))].sort();
}
function categoriaFiltroHtml(id, valorActual){
  const cats = listaCategorias();
  if(cats.length===0) return '';
  return `<select id="${id}" onchange="render()" style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:14px;color:var(--ink);margin-bottom:12px;">
    <option value="" ${!valorActual?'selected':''}>Todas las categorías</option>
    ${cats.map(c=>`<option value="${esc(c)}" ${valorActual===c?'selected':''}>${esc(c)}</option>`).join('')}
  </select>`;
}

let state = {
  jugadoras: load(LS_KEYS.jugadoras, []),
  cargas: load(LS_KEYS.cargas, []),
  evaluaciones: load(LS_KEYS.evaluaciones, []),
  gimnasio: load(LS_KEYS.gimnasio, []),
  planes: load(LS_KEYS.planes, []),   // sesiones planificadas
  notas: load(LS_KEYS.notas, []),     // notas de sesión
  config: load(LS_KEYS.config, { firebase:null, clubNombre:'', deporte:null, ejerciciosCustom:[], testsCustom:[] }),
  tab: 'dashboard'
};

let fbApp=null, fbDb=null, fbAuth=null, fbReady=false;
let currentUser = null;
let authChecked = false;
let userProfile = null; // { clubId, clubNombre, rol } cargado desde pf_usuarios/{uid}
let profileChecked = false;

/* Cambiá este código antes de distribuir la app: es lo que le permite a alguien
   registrarse como administrador general de TactiqForce en vez de como club. */
/* ---- Códigos de acceso (cambiar antes de distribuir) ---- */
const SUPERADMIN_CODE = 'TACTIQFORCE-SUPER-2026';   // SOLO para Laura — no distribuir
const ADMIN_SIGNUP_CODE = 'TACTIQFORCE-ADMIN-2026'; // ya no se usa directamente

function load(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ console.error('Error leyendo', key, e); return fallback; }
}
function persist(key, data){
  try{ localStorage.setItem(key, JSON.stringify(data)); }
  catch(e){ console.error('Error guardando', key, e); showToast('No se pudo guardar (espacio local lleno)'); }
}
function saveJugadoras(){ persist(LS_KEYS.jugadoras, state.jugadoras); syncCollection('jugadoras', state.jugadoras); }
function saveCargas(){ persist(LS_KEYS.cargas, state.cargas); syncCollection('cargas', state.cargas); }
function saveEvaluaciones(){ persist(LS_KEYS.evaluaciones, state.evaluaciones); syncCollection('evaluaciones', state.evaluaciones); }
function saveGimnasio(){ persist(LS_KEYS.gimnasio, state.gimnasio); syncCollection('gimnasio', state.gimnasio); }
function savePlanes(){ persist(LS_KEYS.planes, state.planes); }
function saveNotas(){ persist(LS_KEYS.notas, state.notas); }
function saveConfig(){ persist(LS_KEYS.config, state.config); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}
function generarCodigoClub(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

/* ---------------- Firebase (opcional) + Auth ---------------- */
const TACTIQFORCE_FIREBASE_DEFAULT = {
  apiKey: "AIzaSyDtLLFocooD6RfCiUsEeyb8vEKoYhT52oY",
  authDomain: "tactiqforce.firebaseapp.com",
  projectId: "tactiqforce",
  storageBucket: "tactiqforce.firebasestorage.app",
  messagingSenderId: "893137150031",
  appId: "1:893137150031:web:0d7dc906598621f52a0a3a"
};
function tryInitFirebase(){
  // Usa credenciales guardadas por el usuario, o las del proyecto TactiqForce por defecto
  const cfg = (state.config.firebase && state.config.firebase.apiKey)
    ? state.config.firebase
    : TACTIQFORCE_FIREBASE_DEFAULT;
  if(!cfg || !cfg.apiKey || !cfg.projectId){ updateSyncPill(false,false); authChecked = true; profileChecked = true; return; }
  try{
    fbApp = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(cfg);
    fbDb = firebase.firestore();
    fbAuth = firebase.auth();
    fbReady = true;
    updateSyncPill(true,false);
    fbAuth.onAuthStateChanged(async user=>{
      currentUser = user;
      authChecked = true;
      profileChecked = false;
      userProfile = null;
      render();
      if(user){
        await loadUserProfile();
        profileChecked = true;
        if(userProfile && userProfile.rol!=='admin' && userProfile.rol!=='superadmin'){ pullFromFirebase(); }
        render();
      }
    });
  }catch(e){
    console.error('Error iniciando Firebase', e);
    fbReady = false;
    authChecked = true;
    profileChecked = true;
    updateSyncPill(false,true);
  }
}
function updateSyncPill(on, err){
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (err ? ' err' : on ? ' on' : '');
  lbl.textContent = err ? 'Error de sincronización — tocar para revisar'
    : on ? 'Sincronizado con TactiqForce Cloud ☁'
    : 'Guardado en este dispositivo — tocar para activar sync';
}
async function loadUserProfile(){
  try{
    const doc = await fbDb.collection('pf_usuarios').doc(currentUser.uid).get();
    if(doc.exists){ userProfile = doc.data(); }
  }catch(e){ console.error('Error cargando perfil de usuario', e); }
}
/* Todas las colecciones de datos (jugadoras, cargas, etc.) se guardan bajo el ID del club,
   así todos los preparadores de un mismo club comparten la misma información. */
function accountDocId(){ return userProfile && userProfile.clubId ? userProfile.clubId : (currentUser ? currentUser.uid : 'data'); }
async function syncCollection(name, data){
  if(!fbReady || !currentUser) return;
  try{ await fbDb.collection('pf_'+name).doc(accountDocId()).set({ items: data, updated: Date.now() }); }
  catch(e){ console.error('Error sincronizando '+name, e); updateSyncPill(false,true); }
}
async function pullFromFirebase(){
  if(!fbReady) return;
  try{
    const cols = ['jugadoras','cargas','evaluaciones','gimnasio'];
    for(const name of cols){
      const doc = await fbDb.collection('pf_'+name).doc(accountDocId()).get();
      if(doc.exists){
        const remote = doc.data().items || [];
        const local = state[name] || [];
        if(remote.length >= local.length){ state[name] = remote; persist(LS_KEYS[name], remote); }
      }
    }
    render();
  }catch(e){ console.error('Error trayendo datos de Firebase', e); updateSyncPill(false,true); }
}

/* ---------------- Login / cuentas ---------------- */
function renderLoginScreen(){
  const mode = state._authMode || 'login';
  return `<div class="gate-3d-wrap">
  <div class="gate-3d-bg" id="gateBg3D_login"></div>
  <div class="gate-3d-content sport-gate">
    <div class="glyph">&#128274;</div>
    <h2 style="color:#fff;">${mode==='signup' ? 'Crear cuenta' : 'Ingresar'}</h2>
    <p>${mode==='signup' ? 'Ingresá el código que te dio el administrador de tu club.' : 'Iniciá sesión para acceder a tus datos.'}</p>
    <div style="width:100%;max-width:340px;">
      <div class="field"><label>Email</label><input id="authEmail" type="email" placeholder="preparador@club.com" value="${esc(state._authEmail||'')}"></div>
      <div class="field"><label>Contraseña</label><input id="authPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') ${mode==='signup'?'doSignup()':'doLogin()'}"></div>
      ${mode==='signup' ? `
        <div class="field"><label>Código de club</label>
          <input id="authClubCode" placeholder="Ej: 7K2QRT" style="text-transform:uppercase;letter-spacing:2px;">
          <div class="hint">El código te lo entrega el administrador de tu club.</div>
        </div>
      ` : ''}
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" onclick="${mode==='signup'?'doSignup()':'doLogin()'}">
        ${mode==='signup'?'Crear cuenta':'Ingresar'}
      </button>
      <div style="text-align:center;margin-top:14px;font-size:13px;color:rgba(255,255,255,0.7);">
        ${mode==='signup'
          ? `¿Ya tenés cuenta? <a href="#" style="color:var(--accent);" onclick="event.preventDefault(); toggleAuthMode('login')">Ingresar</a>`
          : `¿Primera vez? <a href="#" style="color:var(--accent);" onclick="event.preventDefault(); toggleAuthMode('signup')">Crear cuenta</a>
             · <a href="#" style="color:var(--accent);" onclick="event.preventDefault(); doPasswordReset()">Olvidé mi contraseña</a>`
        }
      </div>
    </div>
  </div>
  </div>`;
}
function setClubMode(mode){
  state._clubMode = mode;
  const v = document.getElementById('view');
  v.innerHTML = renderLoginScreen();
  iniciarFondoEsfera3D('gateBg3D_login');
}
function toggleAuthMode(mode){
  state._authMode = mode;
  state._clubMode = 'join';
  const v = document.getElementById('view');
  v.innerHTML = renderLoginScreen();
  iniciarFondoEsfera3D('gateBg3D_login');
}
function authFeedback(msg){ showToast(msg); }
function doLogin(){
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  if(!email || !pass){ authFeedback('Completá email y contraseña'); return; }
  state._authEmail = email;
  fbAuth.signInWithEmailAndPassword(email, pass)
    .catch(e=>{ authFeedback(traducirErrorAuth(e)); });
}
async function doSignup(){
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const code  = (document.getElementById('authClubCode')?.value||'').trim().toUpperCase();
  if(!email || !pass){ authFeedback('Completá email y contraseña'); return; }
  if(pass.length < 6){ authFeedback('La contraseña debe tener al menos 6 caracteres'); return; }
  if(!code){ authFeedback('Ingresá el código de tu club'); return; }

  // Verificar que el código de club existe en Firestore
  state._authEmail = email;
  try{
    const clubDoc = await fbDb.collection('pf_clubs').doc(code).get();
    if(!clubDoc.exists){ authFeedback('Código de club inválido. Pedíselo al administrador de tu club.'); return; }
    const clubData = clubDoc.data();
    const cred = await fbAuth.createUserWithEmailAndPassword(email, pass);
    const perfil = {
      email, clubId: code, clubNombre: clubData.nombre||code,
      rol: 'preparador', creado: Date.now()
    };
    await fbDb.collection('pf_usuarios').doc(cred.user.uid).set(perfil);
    state.config.clubNombre = perfil.clubNombre; saveConfig();
    showToast('Cuenta creada. ¡Bienvenido a '+perfil.clubNombre+'!');
  }catch(e){ authFeedback(traducirErrorAuth(e)); }
}

function doPasswordReset(){
  const email = document.getElementById('authEmail').value.trim();
  if(!email){ authFeedback('Ingresá tu email arriba primero'); return; }
  fbAuth.sendPasswordResetEmail(email)
    .then(()=>authFeedback('Te enviamos un email para restablecer la contraseña'))
    .catch(e=>authFeedback(traducirErrorAuth(e)));
}
function doLogout(){
  if(!confirm('¿Cerrar sesión?')) return;
  fbAuth.signOut();
  closeModal();
}
function traducirErrorAuth(e){
  const code = e && e.code || '';
  if(code.includes('user-not-found')) return 'No existe una cuenta con ese email';
  if(code.includes('wrong-password')||code.includes('invalid-credential')) return 'Email o contraseña incorrectos';
  if(code.includes('email-already-in-use')) return 'Ya existe una cuenta con ese email';
  if(code.includes('invalid-email')) return 'Email inválido';
  if(code.includes('weak-password')) return 'La contraseña es muy débil (mínimo 6 caracteres)';
  return 'Error: ' + (e && e.message ? e.message : 'intentá de nuevo');
}

/* ---------------- Panel de Superadmin ---------------- */
async function renderAdminPanel(){
  return `<div style="padding:0;">
    <div style="background:var(--primary-dark);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;">TactiqForce</div>
        <div style="font-size:12px;color:var(--accent);">Panel Superadmin</div>
      </div>
      <button class="btn btn-ghost" style="color:rgba(255,255,255,0.7);" onclick="doLogout()">Cerrar sesión</button>
    </div>
    <div style="padding:16px;">
      <div class="section-head" style="display:flex;align-items:center;justify-content:space-between;">
        <h2>Clubes activos</h2>
        <button class="btn btn-primary btn-sm" onclick="abrirCrearClub()">&#43; Nuevo club</button>
      </div>
      <div id="adminClubList" class="card" style="margin-top:8px;"><span class="chip muted">Cargando...</span></div>
    </div>
  </div>`;
}

async function cargarPanelAdmin(){
  const el = document.getElementById('adminClubList');
  if(!el) return;
  try{
    // Cargar clubes
    const clubsSnap = await fbDb.collection('pf_clubs').orderBy('creado','desc').get();
    // Cargar usuarios para contar preparadores por club
    const usersSnap = await fbDb.collection('pf_usuarios').get();
    const prepsPorClub = {};
    usersSnap.forEach(doc=>{
      const u = doc.data();
      if(u.rol==='preparador'||u.rol==='club'){
        prepsPorClub[u.clubId] = (prepsPorClub[u.clubId]||0)+1;
      }
    });
    if(clubsSnap.empty){
      el.innerHTML = '<span class="chip muted">Todavía no hay clubes. Creá el primero con el botón de arriba.</span>';
      return;
    }
    el.innerHTML = clubsSnap.docs.map(doc=>{
      const c = doc.data();
      const preps = prepsPorClub[doc.id]||0;
      const fecha = c.creado ? new Date(c.creado).toLocaleDateString('es-AR') : '—';
      return `<div class="card card-row" style="margin-bottom:8px;">
        <div>
          <div class="card-title">${esc(c.nombre||doc.id)}</div>
          <div class="card-sub">Código: <strong>${esc(doc.id)}</strong> · ${preps} preparador${preps===1?'':'es'} · Creado: ${fecha}</div>
          <div class="card-sub" style="margin-top:2px;">Admin: ${esc(c.adminEmail||'—')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <button class="btn btn-sm btn-ghost" onclick="abrirCrearAdmin('${esc(doc.id)}','${esc(c.nombre||'')}')">+ Admin</button>
          <button class="btn btn-sm btn-ghost" onclick="verPreparadoresClub('${esc(doc.id)}','${esc(c.nombre||'')}')">Ver</button>

function generarPassword(){
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let p = '';
  for(let i=0;i<8;i++) p += chars[Math.floor(Math.random()*chars.length)];
  return p;
}

    await fbDb.collection('pf_usuarios').doc(cred.user.uid).set(perfil);

function animateNumber(el, from, to, duration){
  if(from===to){ el.textContent = to; return; }
  const start = performance.now();
  function step(now){
    const p = Math.min(1, (now-start)/duration);
    const eased = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(from + (to-from)*eased);
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function renderScoreboard(){
  const hoy = todayStr();
  const cargasHoy = state.cargas.filter(c=>c.fecha===hoy).length;
  const alertas = state.cargas.filter(c=>c.fecha===hoy && Number(c.rpe)>=8).length;
  const el = document.getElementById('scoreboard');
  if(!el.dataset.built){
    el.innerHTML = `
      <div class="score-cell" id="scCell0"><div class="num" id="scNum0">0</div><div class="lbl">Jugadoras</div></div>
      <div class="score-cell" id="scCell1"><div class="num" id="scNum1">0</div><div class="lbl">Cargas hoy</div></div>
      <div class="score-cell" id="scCell2"><div class="num" id="scNum2">0</div><div class="lbl">RPE alto hoy</div></div>
    `;
    el.dataset.built = '1';
  }
  document.getElementById('scCell2').className = 'score-cell' + (alertas>0 ? ' alert' : '');
  const targets = [state.jugadoras.length, cargasHoy, alertas];
  targets.forEach((to, i)=>{
    const numEl = document.getElementById('scNum'+i);
    const from = parseInt(numEl.dataset.val || '0', 10);
    numEl.dataset.val = to;
    animateNumber(numEl, from, to, 450);
  });
}

function calcularEdad(fechaNacimiento){
  if(!fechaNacimiento) return null;
  const nacimiento = new Date(fechaNacimiento+'T00:00:00');
  if(isNaN(nacimiento)) return null;
  const hoy = new Date();
  let edad = hoy.getFullYear() - nacimiento.getFullYear();
  const m = hoy.getMonth() - nacimiento.getMonth();
  if(m<0 || (m===0 && hoy.getDate()<nacimiento.getDate())) edad--;
  return edad;
}
function calcularIMC(peso, altura){
  const p = parseNum(peso), a = parseNum(altura);
  if(!p || !a) return null;
  const aMetros = a/100;
  return p / (aMetros*aMetros);
}
function clasificarIMC(imc){
  if(imc===null) return null;
  if(imc<18.5) return {label:'Bajo peso', cls:'warn'};
  if(imc<25) return {label:'Normal', cls:''};
  if(imc<30) return {label:'Sobrepeso', cls:'warn'};
  return {label:'Obesidad', cls:'danger'};
}

function submitJugadora(id){
  const nombre = document.getElementById('fNombre').value.trim();

    nombre,
    categoria: document.getElementById('fCategoria').value.trim(),

    fechaNacimiento: document.getElementById('fFechaNac').value,
    altura: document.getElementById('fAltura').value,
    peso: document.getElementById('fPeso').value,
    club: document.getElementById('fClub').value.trim(),
    contacto: document.getElementById('fContacto').value.trim()
  };
  if(id){
    const j = state.jugadoras.find(x=>x.id===id);
    Object.assign(j, data);
  } else {
    state.jugadoras.push({ id: uid(), ...data });
  }

function confirmDeleteJugadora(id){

}

  const catFiltro = document.getElementById('cargaCategoria')?.value || '';

    if(catFiltro){ const j = state.jugadoras.find(x=>x.id===c.jugadoraId); if(!j || j.categoria!==catFiltro) return false; }

  }).sort((a,b)=>{

/* A partir del resultado (y algún valor extra) calcula métricas adicionales. */
function computeSecondary(tipoId, resultado, pesoCorporal, extra){
  const r = parseNum(resultado);
  const out = [];
  if(tipoId==='yoyo' && r!==null){
    const vo2 = r*0.0084 + 36.4;
    out.push({key:'vo2max', label:'VO2max estimado', value: vo2.toFixed(1)+' ml/kg/min'});
  }
  if(tipoId==='yoyo2' && r!==null){
    const vo2 = r*0.0136 + 45.3;
    out.push({key:'vo2max', label:'VO2max estimado', value: vo2.toFixed(1)+' ml/kg/min'});
  }
  if(tipoId==='cmj' && extra && extra.tiempoVuelo){
    const t = parseNum(extra.tiempoVuelo);
    if(t){ const h = 122.5*t*t; out.push({key:'alturaCalculada', label:'Altura calculada', value: h.toFixed(1)+' cm'}); }
  }
  if(tipoId==='dropjump' && r!==null && extra && extra.contacto){
    const ct = parseNum(extra.contacto);
    if(ct && ct>0){
      const rsi = (r/100) / ct;
      out.push({key:'rsi', label:'RSI (índice reactivo)', value: rsi.toFixed(2)});
    }
  }
  if(tipoId==='cooper' && r!==null){
    const vo2 = (r - 504.9) / 44.73;
    out.push({key:'vo2max', label:'VO2max estimado', value: vo2.toFixed(1)+' ml/kg/min'});
  }
  if(tipoId==='run1000' && r!==null && r>0){
    const kmh = (1000/r)*3.6;
    out.push({key:'velocidadKmh', label:'Velocidad media', value: kmh.toFixed(1)+' km/h'});
    const min = Math.floor(r/60), seg = Math.round(r%60);
    out.push({key:'tiempoMinSeg', label:'Tiempo', value: `${min}:${seg.toString().padStart(2,'0')} min`});
  }
  if(tipoId==='run2400' && r!==null && r>0){
    const kmh = (2400/r)*3.6;
    out.push({key:'velocidadKmh', label:'Velocidad media', value: kmh.toFixed(1)+' km/h'});
    const min = Math.floor(r/60), seg = Math.round(r%60);
    out.push({key:'tiempoMinSeg', label:'Tiempo', value: `${min}:${seg.toString().padStart(2,'0')} min`});
  }
  if(tipoId==='sprint20' && r!==null && r>0){
    out.push({key:'velocidadKmh', label:'Velocidad media', value: ((20/r)*3.6).toFixed(1)+' km/h'});
  }
  if(tipoId==='sprint30' && r!==null && r>0){
    const kmh = (30/r)*3.6;
    out.push({key:'velocidadKmh', label:'Velocidad media', value: kmh.toFixed(1)+' km/h'});
  }
  if(tipoId==='sprint20' && r!==null && r>0){
    const kmh = (20/r)*3.6;
    out.push({key:'velocidadKmh', label:'Velocidad media', value: kmh.toFixed(1)+' km/h'});
  }
  if(tipoId==='sprint40' && r!==null && r>0){
    const kmh = (40/r)*3.6;
    out.push({key:'velocidadKmh', label:'Velocidad media', value: kmh.toFixed(1)+' km/h'});
  }
  if(tipoId==='run2400' && r!==null && r>0){
    const min = Math.floor(r/60), seg = Math.round(r%60);
    out.push({key:'tiempoMinSeg', label:'Tiempo', value: `${min}:${seg.toString().padStart(2,'0')} min`});
    const kmh = (2.4/(r/3600));
    out.push({key:'velocidadMedia', label:'Velocidad media', value: kmh.toFixed(1)+' km/h'});
  }
  if(tipoId==='sprint40' && r!==null && r>0){
    out.push({key:'velocidadKmh', label:'Velocidad media', value: ((40/r)*3.6).toFixed(1)+' km/h'});
  }
  if(tipoId==='sqjump' && r!==null){
    const tv = extra && extra.tiempoVuelo ? parseNum(extra.tiempoVuelo) : null;
    if(tv && tv>0){
      const calc = (9.81*(tv**2))/8*100;
      out.push({key:'alturaCalculada', label:'Altura calculada (tiempo vuelo)', value: calc.toFixed(1)+' cm'});
    }
  }
  if(tipoId==='rsa' && extra){
    const mejor = parseNum(extra.mejor), peor = parseNum(extra.peor), n = parseNum(extra.nsprints);
    if(mejor && peor && mejor>0){
      const idxFatiga = ((peor - mejor) / mejor) * 100;
      out.push({key:'fatiga', label:'Índice de fatiga', value: idxFatiga.toFixed(1)+' %'});
    }
    if(n && r!==null && n>0){
      out.push({key:'promedioSprint', label:'Promedio por sprint', value: (r/n).toFixed(2)+' seg'});
    }
  }
  if((tipoId==='squat1rm'||tipoId==='bench1rm'||tipoId==='powerclean') && r!==null){
    const reps = extra ? extra.reps : null;
    const est = estimar1RM(r, reps);
    if(est!==null){
      out.push({key:'estimado1RM', label:'1RM estimado', value: est.toFixed(1)+' kg'});
      out.push({key:'cargasEntrenamiento', label:'Cargas de referencia', value: `70%: ${(est*0.7).toFixed(1)}kg · 80%: ${(est*0.8).toFixed(1)}kg · 90%: ${(est*0.9).toFixed(1)}kg`});
    }
  }
  return out;
}
function readExtraFormValues(tipoId){
  const obj = {};
  extraFieldsFor(tipoId).forEach(f=>{
    const el = document.getElementById('eExtra_'+f.key);
    if(el) obj[f.key] = el.value.trim();
  });
  return obj;
}
function autoCalcCMJ(){
  const t = parseNum(document.getElementById('eExtra_tiempoVuelo')?.value);
  if(t){ document.getElementById('eResultado').value = (122.5*t*t).toFixed(1); }
}

function parseNum(v){
  const n = parseFloat(String(v??'').replace(',','.'));
  return isNaN(n) ? null : n;
}
/* reps>1 en tests de 1RM: estima el máximo real con la fórmula de Epley antes de clasificar. */
function estimar1RM(peso, reps){
  const p = parseNum(peso), r = parseNum(reps);
  if(p===null) return null;
  if(!r || r<=1) return p;
  return p * (1 + r/30);
}
function sexoDe(jugadoraId){
  const j = state.jugadoras.find(x=>x.id===jugadoraId);
  return j && j.sexo==='M' ? 'M' : 'F';
}
/* Devuelve {label, cls, valorUsado} o null si no se puede clasificar (tipo sin tabla, sin peso, etc.) */
function classifyTest(tipoId, resultado, pesoCorporal, reps, sexo){
  const entry = STANDARDS[tipoId];
  if(!entry) return null;
  const table = entry[sexo==='M' ? 'M' : 'F'];
  if(!table) return null;
  const r = parseNum(resultado);
  if(r===null) return null;
  let value = r;
  if(entry.ratio){
    const bw = parseNum(pesoCorporal);
    if(!bw || bw<=0) return null;
    const est = estimar1RM(r, reps);
    value = est / bw;
  }
  for(const band of table.bands){ if(value < band.max) return {...band, valorUsado:value}; }
  return null;
}
function classifChip(tipoId, resultado, pesoCorporal, reps, sexo){
  const c = classifyTest(tipoId, resultado, pesoCorporal, reps, sexo);
  if(!c) return '';
  return `<span class="chip ${c.cls}">${esc(c.label)}</span>`;
}

function tipoLabel(t){
  if(t.tipoId){ const info = tipoInfo(t.tipoId); return t.tipoId==='otro' ? (t.tipoOtro||'Otro') : (info?info.label:t.tipoId); }
  return t.tipo || 'Test'; // compatibilidad con registros viejos
}

function analizarJugadora(jugadoraId){
  const tests = state.evaluaciones.filter(t=>t.jugadoraId===jugadoraId);
  // map dominio id → label for custom tests
  const dominioLabels = {resistencia:'Resistencia',velocidad:'Velocidad',agilidad:'Agilidad',potencia:'Potencia / salto',flexibilidad:'Flexibilidad',fuerzaInf:'Fuerza tren inferior',fuerzaSup:'Fuerza tren superior',fuerzaCore:'Fuerza core'};
  return DOMINIOS.map(d=>{
    // include custom tests whose configured domain matches this domain
    const delDominio = tests.filter(t=>{
      if(d.tipoIds.includes(t.tipoId)) return true;
      if(t.tipoId==='otro' && t.otroDominio && d.tipoIds[0]){
        // match by dominio label key
        const key = Object.entries(dominioLabels).find(([k,v])=>v===d.label)?.[0];
        return t.otroDominio===key;
      }
      return false;
    }).sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const ultimo = delDominio[0];
    if(!ultimo) return { ...d, sinDatos:true };
    const reps = ultimo.extra ? ultimo.extra.reps : null;
    const c = classifyTest(ultimo.tipoId, ultimo.resultado, ultimo.pesoCorporal, reps, sexoDe(jugadoraId));
    const info = tipoInfo(ultimo.tipoId);
    return {
      ...d,
      sinDatos: false,
      fecha: ultimo.fecha,
      clasif: c,
      rank: c ? RANK_CLS[c.cls] : 0,
      valorMostrado: ultimo.resultado + (ultimo.unidad ? ' '+ultimo.unidad : ''),
      labelTest: ultimo.tipoId==='otro' ? (ultimo.tipoOtro||'Otro') : (info ? info.label : tipoLabel(ultimo))
    };
  });
}

function narrativoAnalisis(jugadoraId, dominios, rpe7, suenoH, sueno7, imc, prs){
  const j = state.jugadoras.find(x=>x.id===jugadoraId);
  if(!j) return '';
  const sexoLabel = j.sexo==='M' ? 'varón' : 'jugadora';
  const partes = [];

  // IMC
  if(imc!==null){
    const imcClasif = clasificarIMC(imc);
    partes.push(`IMC de ${imc.toFixed(1)} (${imcClasif?imcClasif.label:'—'})`);
  }

  // Dominios con datos
  const conDatos = dominios.filter(d=>!d.sinDatos && d.clasif);
  const buenos   = conDatos.filter(d=>d.rank>=4);
  const debiles  = conDatos.filter(d=>d.rank<=2);
  const sinDatos = dominios.filter(d=>d.sinDatos);

  if(buenos.length>0){
    partes.push(`buen nivel en ${buenos.map(d=>d.label.toLowerCase()).join(' y ')}`);
  }
  if(debiles.length>0){
    partes.push(`${debiles.map(d=>d.label.toLowerCase()+' por debajo del promedio para su sexo ('+d.clasif.label+')').join('; ')}`);
  }

  // Gimnasio
  if(prs.length>0){
    const top = prs.slice(0,2).map(p=>`${p.ejercicio} ${p.peso} kg`).join(', ');
    partes.push(`en gimnasio sus mejores marcas son ${top}`);
  }

  // Bienestar
  if(suenoH && rpe7){
    const bienStr = suenoH.promedio>=7 && rpe7.promedio<7
      ? 'bienestar adecuado (sueño y RPE dentro del rango normal)'
      : suenoH.promedio<6 && rpe7.promedio>=7
      ? 'señales de fatiga: sueño insuficiente ('+suenoH.promedio.toFixed(1)+' h) con carga percibida alta (RPE '+rpe7.promedio.toFixed(1)+')'
      : `sueño promedio de ${suenoH.promedio.toFixed(1)} h y RPE de ${rpe7.promedio.toFixed(1)}/10 en los últimos 7 días`;
    partes.push(bienStr);
  }

  if(partes.length===0) return `<div class="setup-note" style="margin-top:8px;">Sin datos suficientes para generar un análisis narrativo. Cargá tests, carga diaria y gimnasio para ver la conclusión.</div>`;

  // Conclusión prioridades
  let prioridad = '';
  if(debiles.length>0){
    prioridad = ` Se recomienda priorizar el trabajo de <strong>${debiles.map(d=>d.label.toLowerCase()).join(' y ')}</strong>.`;
  } else if(sinDatos.length>=4){
    prioridad = ` Faltan tests en ${sinDatos.length} áreas para completar el perfil físico.`;
  } else if(buenos.length>0){
    prioridad = ` Perfil físico equilibrado — continuar con la planificación actual.`;
  }

  return `<div class="setup-note" style="margin-top:4px;font-size:13px;line-height:1.7;">
    ${j.nombre} presenta ${partes.join(', ')}.${prioridad}
    <span style="color:var(--ink-faint);font-size:11px;display:block;margin-top:6px;">Análisis orientativo basado en los datos cargados. No reemplaza el criterio profesional.</span>
  </div>`;
}

/* Para cada test, indica si un valor MAYOR es mejor (true) o menor es mejor (false). */
const TEST_MAYOR_MEJOR = {
  yoyo:true, yoyo2:true, yoyoie1:true, yoyoie2:true, cooper:true, run1000:false, run2400:false,
  sprint20:false, sprint30:false, sprint40:false, rsa:false,
  ttest:false, illinois:false, laneagility:false, cod505:false, proagility:false,
  cmj:true, squatjump:true, spikejump:true, blockjump:true, saltolargo:true, dropjump:true,
  sitreach:true,
  squat1rm:true, bench1rm:true, benchthrow:true,
  handgrip:true, pullups:true, abdominales:true, flexiones:true
};
function renderEvolucionJugadora(jugadoraId){
  const tests = state.evaluaciones.filter(t=>t.jugadoraId===jugadoraId);
  // agrupar por tipo (para 'otro', por su nombre libre)
  const porTipo = {};
  tests.forEach(t=>{
    const clave = t.tipoId==='otro' ? 'otro:'+(t.tipoOtro||'Otro') : t.tipoId;
    (porTipo[clave] = porTipo[clave] || []).push(t);
  });
  const bloques = [];
  Object.keys(porTipo).forEach(clave=>{
    const registros = porTipo[clave].filter(t=>parseNum(t.resultado)!==null)
      .sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(registros.length<2) return; // solo si hay 2+ para comparar
    const primero = registros[0], ultimo = registros[registros.length-1];
    const vIni = parseNum(primero.resultado), vFin = parseNum(ultimo.resultado);
    const tipoId = ultimo.tipoId;
    const label = tipoLabel(ultimo);
    const unidad = ultimo.unidad || '';
    const mayorMejor = tipoId==='otro'
      ? (ultimo.otroDireccion === 'menor' ? false : true)
      : TEST_MAYOR_MEJOR[tipoId];
    const delta = vFin - vIni;
    const pct = vIni!==0 ? (delta/Math.abs(vIni))*100 : 0;
    let estado, cls, flecha;
    if(delta===0){ estado='Se mantiene'; cls='muted'; flecha='→'; }
    else {
      const mejoro = mayorMejor===undefined ? null : (mayorMejor ? delta>0 : delta<0);
      if(mejoro===true){ estado='Mejoró'; cls=''; flecha='▲'; }
      else if(mejoro===false){ estado='Retrocedió'; cls='danger'; flecha='▼'; }
      else { estado='Cambió'; cls='muted'; flecha='•'; }
    }
    bloques.push(`<div class="test-history-item">
      <span>${esc(label)} <span class="hint">(${registros.length} tests)</span></span>
      <span>${vIni}${unidad?' '+esc(unidad):''} → ${vFin}${unidad?' '+esc(unidad):''} <span class="chip ${cls}" style="margin-left:4px;">${flecha} ${esc(estado)}${delta!==0?` ${Math.abs(pct).toFixed(0)}%`:''}</span></span>
    </div>`);
  });
  if(bloques.length===0) return '';
  return `
    <div class="eyebrow" style="margin-top:14px;">Evolución</div>
    <div class="card" style="margin-top:8px;">${bloques.join('')}</div>
  `;
}
function extraResumen(t){
  if(!t.extra) return '';
  const parts = [];
  extraFieldsFor(t.tipoId).forEach(f=>{
    if(f.key==='tiempoVuelo') return; // se refleja en la altura calculada, no hace falta repetir
    if(t.extra[f.key]) parts.push(`${f.key==='reps'?'reps':f.label.split('(')[0].trim()}: ${esc(t.extra[f.key])}`);
  });
  const destacar = {yoyo:'vo2max', yoyo2:'vo2max', cooper:'vo2max', run1000:'tiempoMinSeg', run2400:'tiempoMinSeg', sprint20:'velocidadKmh', sprint30:'velocidadKmh', sprint40:'velocidadKmh', rsa:'fatiga', squat1rm:'estimado1RM', bench1rm:'estimado1RM', benchthrow:'estimado1RM', cmj:'alturaCalculada', squatjump:'alturaCalculada', dropjump:'rsi'}[t.tipoId];
  if(destacar && t.extra[destacar]) parts.push(esc(t.extra[destacar]));
  return parts.join(' · ');
}

function submitTestMatriz(){
  const tipoId  = document.getElementById('tmTipo')?.value || state._testMatrizTipo;
  const fecha   = document.getElementById('tmFecha')?.value || state._testMatrizFecha || todayStr();
  const catFiltro = document.getElementById('evalCategoria')?.value || '';
  const jugadoras = state.jugadoras
    .filter(j=>!catFiltro || j.categoria===catFiltro)
    .sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const info    = [...TEST_TIPOS, ...(state.config.testsCustom||[]).map(tc=>({id:'custom_'+tc.id,...tc}))].find(t=>t.id===tipoId);
  const isCustom = tipoId.startsWith('custom_');
  const customTc = isCustom ? (state.config.testsCustom||[]).find(tc=>tc.id===tipoId.replace('custom_','')) : null;
  const extraFields = isCustom ? [] : extraFieldsFor(tipoId);
  const extraCols   = extraFields.slice(0,2);
  let guardados = 0;
  jugadoras.forEach((j,i)=>{
    const resultado = document.getElementById('tm_res_'+i)?.value.trim();
    if(!resultado) return;
    const peso = document.getElementById('tm_peso_'+i)?.value.trim() || '';
    const extra = {};
    extraCols.forEach(f=>{ extra[f.key] = document.getElementById(`tm_extra_${i}_${f.key}`)?.value.trim()||''; });
    computeSecondary(tipoId, resultado, peso, extra).forEach(s=>{ extra[s.key]=s.value; });
    const base = {
      jugadoraId: j.id,
      tipoId: isCustom ? 'otro' : tipoId,
      tipoOtro: customTc ? customTc.nombre : '',
      customTestId: customTc ? customTc.id : null,
      otroDominio: customTc ? customTc.dominio : null,
      otroDireccion: customTc ? (customTc.direccion||'mayor') : 'mayor',
      fecha, resultado,
      unidad: customTc ? (customTc.unidad||'') : (info?.unit||''),
      pesoCorporal: peso, extra, notas:''
    };
    const ex = state.evaluaciones.find(e=>e.jugadoraId===j.id && e.fecha===fecha &&
      (isCustom ? e.customTestId===customTc?.id : e.tipoId===tipoId));
    if(ex){ Object.assign(ex, base); }
    else { state.evaluaciones.push({ id:uid(), ...base }); }
    guardados++;
  });
  if(guardados===0){ showToast('No completaste ninguna fila'); return; }
  saveEvaluaciones(); closeModal(); render();
  showToast(`${guardados} resultado${guardados===1?'':'s'} guardado${guardados===1?'':'s'}`);
}

function updateClasifPreview(){

  const secHtml = secundarios.length ? secundarios.map(s=>`<div class="hint">${esc(s.label)}: <strong>${esc(s.value)}</strong></div>`).join('') : '';
  if(!fuente){
    el.innerHTML = secHtml
      ? `<div style="margin:-4px 0 12px;">${secHtml}</div>`
      : (resultado ? `<div class="hint" style="margin:-4px 0 12px;">Sin tabla de clasificación confiable para este test todavía — el resultado queda igual guardado para comparar en el tiempo.</div>` : '');
    return;
  }
  if(!resultado){ el.innerHTML = `<div class="hint" style="margin:-4px 0 12px;">Referencia: ${esc(fuente)}</div>`; return; }
  if(!c){

    el.innerHTML = `<div style="margin:-4px 0 12px;"><div class="hint">Sin clasificación${needsWeight}</div>${secHtml}</div>`;

  }
  el.innerHTML = `<div style="margin:-4px 0 12px;">
    <span class="chip ${c.cls}">${esc(c.label)}</span>
    ${secHtml}
    <div class="hint" style="margin-top:4px;">Referencia: ${esc(fuente)}. Valor orientativo, no reemplaza el criterio profesional.</div>

}
function submitEvaluacion(id){
  const jugadoraId = document.getElementById('eJugadora').value;
  const resultado = document.getElementById('eResultado').value.trim();
  if(!jugadoraId){ showToast('Elegí una jugadora'); return; }
  if(!resultado){ showToast('Ingresá el resultado'); return; }

  // detect if it's a custom test (has hidden customTestId input)
  const customTestIdEl = document.getElementById('eCustomTestId');
  const customTestId = customTestIdEl ? customTestIdEl.value : null;
  const customTest = customTestId ? (state.config.testsCustom||[]).find(tc=>tc.id===customTestId) : null;

  const tipoIdEl = document.getElementById('eTipo');
  const tipoId = tipoIdEl ? tipoIdEl.value : 'otro';
  const peso = document.getElementById('ePeso') ? document.getElementById('ePeso').value : '';
  const extra = readExtraFormValues(tipoId);
  computeSecondary(tipoId, resultado, peso, extra).forEach(s=>{ extra[s.key] = s.value; });

  let tipoOtro = '', otroDominio = null, otroDireccion = 'mayor', otroUnidad = '';
  if(customTest){
    tipoOtro = customTest.nombre;
    otroDominio = customTest.dominio;
    otroDireccion = customTest.direccion || 'mayor';
    otroUnidad = customTest.unidad || '';
  }

  const data = {
    jugadoraId,
    tipoId: customTest ? 'otro' : tipoId,
    tipoOtro,
    customTestId: customTest ? customTest.id : null,
    otroDominio, otroDireccion, otroUnidad,
    fecha: document.getElementById('eFecha').value || todayStr(),
    resultado,
    unidad: customTest ? otroUnidad : document.getElementById('eUnidad').value.trim(),
    pesoCorporal: peso,
    extra,
    notas: document.getElementById('eNotas').value.trim()
  };
  if(id){
    const t = state.evaluaciones.find(x=>x.id===id);
    Object.assign(t, data);
  } else {
    state.evaluaciones.push({ id: uid(), ...data });
  }
  saveEvaluaciones(); closeModal(); render();
  showToast('Test guardado');
}

/* ---------------- Gimnasio ---------------- */
function mejoresMarcas(jugadoraId){
  const registros = state.gimnasio.filter(g=>g.jugadoraId===jugadoraId);
  const porEjercicio = {};
  registros.forEach(g=>{
    const nombre = ejercicioLabel(g);
    const peso = parseNum(g.peso) || 0;
    if(!porEjercicio[nombre] || peso > (parseNum(porEjercicio[nombre].peso)||0)){
      porEjercicio[nombre] = { ejercicio: nombre, peso: g.peso, series: g.series, reps: g.reps, fecha: g.fecha };
    }
  });
  return Object.values(porEjercicio).sort((a,b)=>a.ejercicio.localeCompare(b.ejercicio));
}
function ejercicioLabel(g){ return g.ejercicio==='Otro' ? (g.ejercicioOtro||'Otro') : g.ejercicio; }
/* Arma una planilla: filas = fechas, columnas = ejercicios, celdas = peso máx de ese día. */
function renderPlanillaGimnasio(jugadoraId){
  const registros = state.gimnasio.filter(g=>g.jugadoraId===jugadoraId);
  if(registros.length===0) return '';
  // ejercicios (columnas) y fechas (filas) únicas
  const ejercicios = [...new Set(registros.map(ejercicioLabel))].sort();
  const fechas = [...new Set(registros.map(g=>g.fecha))].sort();
  // matriz[fecha][ejercicio] = peso máximo cargado ese día
  const matriz = {};
  registros.forEach(g=>{
    const ej = ejercicioLabel(g), f = g.fecha, p = parseNum(g.peso)||0;
    matriz[f] = matriz[f] || {};
    if(matriz[f][ej]===undefined || p>matriz[f][ej]) matriz[f][ej] = p;
  });
  const ths = ejercicios.map(e=>`<th>${esc(e)}</th>`).join('');
  const rows = fechas.map(f=>{
    const celdas = ejercicios.map(e=>{
      const v = matriz[f][e];
      return `<td>${v!==undefined ? v+' kg' : '<span class="pl-empty">—</span>'}</td>`;
    }).join('');
    return `<tr><td class="pl-fecha">${fmtDate(f)}</td>${celdas}</tr>`;
  }).join('');
  return `
    <div class="eyebrow" style="margin-top:14px;">Planilla de progresión</div>
    <div class="planilla-wrap">
      <table class="planilla">
        <thead><tr><th class="pl-fecha">Fecha</th>${ths}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
/* Evolución por ejercicio: primer vs último peso, con flecha de progresión. */
function renderEvolucionGimnasio(jugadoraId){
  const registros = state.gimnasio.filter(g=>g.jugadoraId===jugadoraId);
  const porEjercicio = {};
  registros.forEach(g=>{
    const ej = ejercicioLabel(g);
    if(parseNum(g.peso)===null) return;
    (porEjercicio[ej] = porEjercicio[ej] || []).push(g);
  });
  const bloques = [];
  Object.keys(porEjercicio).sort().forEach(ej=>{
    const lista = porEjercicio[ej].sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(lista.length<2) return;
    const ini = parseNum(lista[0].peso), fin = parseNum(lista[lista.length-1].peso);
    const delta = fin - ini;
    const pct = ini!==0 ? (delta/Math.abs(ini))*100 : 0;
    let estado, cls, flecha;
    if(delta>0){ estado='Subió'; cls=''; flecha='▲'; }
    else if(delta<0){ estado='Bajó'; cls='danger'; flecha='▼'; }
    else { estado='Se mantiene'; cls='muted'; flecha='→'; }
    bloques.push(`<div class="test-history-item">
      <span>${esc(ej)} <span class="hint">(${lista.length} registros)</span></span>
      <span>${ini} → ${fin} kg <span class="chip ${cls}" style="margin-left:4px;">${flecha} ${esc(estado)}${delta!==0?` ${Math.abs(pct).toFixed(0)}%`:''}</span></span>
    </div>`);
  });
  if(bloques.length===0) return '';
  return `
    <div class="eyebrow" style="margin-top:14px;">Evolución de cargas</div>
    <div class="card" style="margin-top:8px;">${bloques.join('')}</div>
  `;
}

function submitCargaMatriz(){
  const modo = state._matrizModo || 'grilla';
  const fecha = state._matrizFecha || todayStr();
  const catFiltro = document.getElementById('gimCategoria')?.value || '';
  const jugadoras = state.jugadoras.filter(j=>!catFiltro || j.categoria===catFiltro)
    .sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const ejercicios = listaEjercicios().filter(e=>e!=='Otro');
  let guardados = 0;

  function upsert(jugadoraId, ejercicio, peso, series, reps){
    if(!peso) return;
    const ex = state.gimnasio.find(g=>g.jugadoraId===jugadoraId && g.fecha===fecha && ejercicioLabel(g)===ejercicio);
    if(ex){ Object.assign(ex,{peso,series:series||ex.series||'',reps:reps||ex.reps||''}); }
    else { state.gimnasio.push({id:uid(),jugadoraId,ejercicio,ejercicioOtro:'',fecha,peso,series:series||'',reps:reps||'',rpe:'',notas:''}); }
    guardados++;
  }

  if(modo==='grilla'){
    ejercicios.forEach((ej,ei)=>{
      jugadoras.forEach((j,ji)=>{
        const peso = document.getElementById(`gc_${ei}_${ji}`)?.value.trim();
        upsert(j.id, ej, peso, '', '');
      });
    });
  } else if(modo==='jugadora'){
    const jugadoraId = state._matrizJugadora || (jugadoras[0]&&jugadoras[0].id);
    ejercicios.forEach((ej,i)=>{
      const peso   = document.getElementById('mtx_peso_'+i)?.value.trim();
      const series = document.getElementById('mtx_series_'+i)?.value.trim()||'';
      const reps   = document.getElementById('mtx_reps_'+i)?.value.trim()||'';
      upsert(jugadoraId, ej, peso, series, reps);
    });
  } else {
    const selEj = state._matrizEjercicio || ejercicios[0];
    jugadoras.forEach((j,i)=>{
      const peso   = document.getElementById('mtx_peso_'+i)?.value.trim();
      const series = document.getElementById('mtx_series_'+i)?.value.trim()||'';
      const reps   = document.getElementById('mtx_reps_'+i)?.value.trim()||'';
      upsert(j.id, selEj, peso, series, reps);
    });
  }

  if(guardados===0){ showToast('No completaste ninguna celda'); return; }
  saveGimnasio(); closeModal(); render();
  showToast(`${guardados} registro${guardados===1?'':'s'} guardado${guardados===1?'':'s'}`);
}

/* ---------------- Análisis integral ---------------- */
function promedioReciente(jugadoraId, campo, dias){
  const desde = new Date(); desde.setDate(desde.getDate()-dias);
  const desdeStr = desde.toISOString().slice(0,10);
  const vals = state.cargas
    .filter(c=>c.jugadoraId===jugadoraId && c.fecha>=desdeStr)
    .map(c=>parseNum(c[campo]))
    .filter(v=>v!==null);
  if(vals.length===0) return null;
  return { promedio: vals.reduce((a,b)=>a+b,0)/vals.length, n: vals.length };
}
