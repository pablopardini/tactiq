function renderAnalisisIntegral(jugadoraId){
  const j = state.jugadoras.find(x=>x.id===jugadoraId);
  if(!j) return '';

  const rpe7   = promedioReciente(jugadoraId, 'rpe', 7);
  const suenoH = promedioReciente(jugadoraId, 'sueno', 7);
  const sueno7 = promedioReciente(jugadoraId, 'dolor', 7);
  const cargasRecientes = state.cargas.filter(c=>c.jugadoraId===jugadoraId)
    .sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,7);
  const dominios = analizarJugadora(jugadoraId);
  const testsJugadora = state.evaluaciones.filter(t=>t.jugadoraId===jugadoraId);
  const prs  = mejoresMarcas(jugadoraId);
  const imc  = calcularIMC(j.peso, j.altura);
  const imcClasif = clasificarIMC(imc);
  const edad = calcularEdad(j.fechaNacimiento);

  // --- Bloque superior: semáforo + narrativo ---
  const resumen = `
    <div class="eyebrow">Resumen del estado integral</div>
    <div class="card" style="margin-top:8px;">
      ${semaforo(dominios, rpe7, suenoH)}
      ${imc!==null ? `<div style="font-size:12px;color:var(--ink-muted);margin-bottom:8px;">
        IMC: <strong style="color:var(--ink);">${imc.toFixed(1)}</strong>
        ${imcClasif?`<span class="chip ${imcClasif.cls}" style="margin-left:4px;">${esc(imcClasif.label)}</span>`:''}
        ${edad!==null ? `· ${edad} años` : ''}
        ${j.sexo ? `· ${j.sexo==='M'?'Masculino':'Femenino'}` : ''}
      </div>` : ''}
      ${narrativoAnalisis(jugadoraId, dominios, rpe7, suenoH, sueno7, imc, prs)}
    </div>
  `;

  // --- Bienestar detallado ---
  const bienestar = `
    <div class="eyebrow" style="margin-top:14px;">Bienestar — últimos 7 días</div>
    <div class="card" style="margin-top:8px;">
      <div class="test-history-item"><span>RPE promedio</span><span>${rpe7?`${rpe7.promedio.toFixed(1)}/10 <span class="chip ${rpe7.promedio>=8?'danger':rpe7.promedio>=6?'warn':''}">${rpe7.promedio>=8?'Alto':rpe7.promedio>=6?'Moderado':'Bajo'}</span>`:'<span class="chip muted">Sin datos</span>'}</span></div>
      <div class="test-history-item"><span>Sueño promedio</span><span>${suenoH?`${suenoH.promedio.toFixed(1)} h <span class="chip ${suenoH.promedio<6?'danger':suenoH.promedio<7?'warn':''}">${suenoH.promedio<6?'Insuficiente':suenoH.promedio<7?'Justo':'Bueno'}</span>`:'<span class="chip muted">Sin datos</span>'}</span></div>
      <div class="test-history-item"><span>Dolor muscular promedio</span><span>${sueno7?`${sueno7.promedio.toFixed(1)}/10 <span class="chip ${sueno7.promedio>=6?'danger':sueno7.promedio>=4?'warn':''}">${sueno7.promedio>=6?'Alto':sueno7.promedio>=4?'Medio':'Bajo'}</span>`:'<span class="chip muted">Sin datos</span>'}</span></div>
      <div class="test-history-item"><span>Registros de carga</span><span>${cargasRecientes.length} en 7 días</span></div>
    </div>
  `;

  // --- Tests detallados ---
  const fisico = `
    <div class="eyebrow" style="margin-top:14px;">Estado físico — por dominio</div>
    <div class="card" style="margin-top:8px;">
      ${dominios.map(d=>`<div class="test-history-item">
        <span>${esc(d.label)}${d.labelTest&&!d.sinDatos?` <span class="hint">(${esc(d.labelTest)})</span>`:''}</span>
        <span>${dominioChip(d)}${!d.sinDatos?` <span class="hint" style="font-size:11px;">${esc(d.valorMostrado||'')} · ${fmtDate(d.fecha)}</span>`:''}</span>
      </div>`).join('')}
    </div>
    ${testsJugadora.length===0
      ? `<div class="setup-note" style="margin-top:8px;">Sin tests registrados todavía.</div>`
      : dominios.every(d=>d.sinDatos)
        ? `<div class="setup-note" style="margin-top:8px;">Hay ${testsJugadora.length} test${testsJugadora.length===1?'':'s'} registrado${testsJugadora.length===1?'':'s'} pero ninguno coincide con los dominios de análisis.</div>` : ''}
  `;

  // --- Gimnasio detallado ---
  const fuerza = `
    <div class="eyebrow" style="margin-top:14px;">Fuerza — mejores marcas</div>
    <div class="card" style="margin-top:8px;">
      ${prs.length===0 ? '<span class="chip muted">Sin registros de gimnasio</span>' :
        prs.slice(0,8).map(p=>`<div class="test-history-item"><span>${esc(p.ejercicio)}</span><span>${esc(p.peso)} kg${p.series?` · ${esc(p.series)}×${esc(p.reps||'')}`:''}</span></div>`).join('')}
    </div>
  `;

  return resumen + bienestar + fisico + fuerza;
}

/* ---------------- Calendario / Agenda ---------------- */
function renderCalendario(){
  const vista = state._calVista || 'mes';
  const hoy   = new Date();
  let anio  = state._calAnio  !== undefined ? state._calAnio  : hoy.getFullYear();
  let mes   = state._calMes   !== undefined ? state._calMes   : hoy.getMonth();
  let semIni = state._calSemIni || lunes(hoy);
  const catFiltro = state._calCat || '';
  const cats = ['', ...[...new Set(state.jugadoras.map(j=>j.categoria).filter(Boolean))].sort()];

  const catSelector = cats.length>1 ? `<select onchange="state._calCat=this.value; render();"
    style="font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);">
    ${cats.map(c=>`<option value="${esc(c)}" ${catFiltro===c?'selected':''}>${c||'Todas'}</option>`).join('')}
  </select>` : '';

  return `
    <div class="cal-nav">
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-sm btn-ghost" onclick="calPrev()">&#8592;</button>
        <h3 id="calTitle">${calTitulo(vista,anio,mes,semIni)}</h3>
        <button class="btn btn-sm btn-ghost" onclick="calNext()">&#8594;</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        ${catSelector}
        <div class="cal-view-toggle">
          <button class="cal-vtab ${vista==='mes'?'active':''}" onclick="state._calVista='mes'; render()">Mes</button>
          <button class="cal-vtab ${vista==='semana'?'active':''}" onclick="state._calVista='semana'; render()">Semana</button>
        </div>
      </div>
    </div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-dot cal-dot-carga"></div>Carga</div>
      <div class="cal-legend-item"><div class="cal-dot cal-dot-test"></div>Tests</div>
      <div class="cal-legend-item"><div class="cal-dot cal-dot-gym"></div>Gimnasio</div>
      <div class="cal-legend-item"><div class="cal-dot cal-dot-plan"></div>Planificado</div>
      <div class="cal-legend-item"><div class="cal-dot cal-dot-nota"></div>Nota</div>
    </div>
    ${vista==='mes' ? renderCalMes(anio, mes, catFiltro) : renderCalSemana(semIni, catFiltro)}
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" onclick="openPlanForm()">
      &#43; Agregar sesión planificada
    </button>
  `;
}
function lunes(fecha){
  const d = new Date(fecha);
  const dia = d.getDay();
  const diff = (dia===0 ? -6 : 1-dia);
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}
function calTitulo(vista,anio,mes,semIni){
  if(vista==='mes'){
    return new Date(anio,mes,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  }
  const fin = new Date(semIni); fin.setDate(fin.getDate()+6);
  return semIni.toLocaleDateString('es-AR',{day:'numeric',month:'short'})+' – '+fin.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
}
function calPrev(){
  const vista = state._calVista||'mes';
  if(vista==='mes'){
    let m = (state._calMes!==undefined?state._calMes:new Date().getMonth()) - 1;
    let a = state._calAnio!==undefined?state._calAnio:new Date().getFullYear();
    if(m<0){m=11;a--;}
    state._calMes=m; state._calAnio=a;
  } else {
    const s = state._calSemIni||lunes(new Date());
    s.setDate(s.getDate()-7); state._calSemIni=s;
  }
  render();
}
function calNext(){
  const vista = state._calVista||'mes';
  if(vista==='mes'){
    let m = (state._calMes!==undefined?state._calMes:new Date().getMonth()) + 1;
    let a = state._calAnio!==undefined?state._calAnio:new Date().getFullYear();
    if(m>11){m=0;a++;}
    state._calMes=m; state._calAnio=a;
  } else {
    const s = state._calSemIni||lunes(new Date());
    s.setDate(s.getDate()+7); state._calSemIni=s;
  }
  render();
}
function diaStr(d){ return d.toISOString().slice(0,10); }
function datosDelDia(fechaStr, catFiltro){
  const filtJ = id=>{ if(!catFiltro) return true; const j=state.jugadoras.find(x=>x.id===id); return j&&j.categoria===catFiltro; };
  return {
    cargas:     state.cargas.filter(c=>c.fecha===fechaStr && filtJ(c.jugadoraId)),
    tests:      state.evaluaciones.filter(t=>t.fecha===fechaStr && filtJ(t.jugadoraId)),
    gimnasio:   state.gimnasio.filter(g=>g.fecha===fechaStr && filtJ(g.jugadoraId)),
    planes:     state.planes.filter(p=>p.fecha===fechaStr),
    notas:      state.notas.filter(n=>n.fecha===fechaStr)
  };
}
function renderCalMes(anio, mes, catFiltro){
  const hoy = diaStr(new Date());
  const primerDia = new Date(anio, mes, 1);
  const dow = ['L','M','X','J','V','S','D'];
  let inicio = new Date(primerDia);
  const diaIni = inicio.getDay();
  inicio.setDate(inicio.getDate() - (diaIni===0?6:diaIni-1));
  const celdas = [];
  for(let i=0;i<42;i++){
    const d = new Date(inicio); d.setDate(inicio.getDate()+i);
    const fStr = diaStr(d);
    const otroMes = d.getMonth()!==mes;
    const datos = datosDelDia(fStr, catFiltro);
    const totalDots = datos.cargas.length+datos.tests.length+datos.gimnasio.length+datos.planes.length+datos.notas.length;
    celdas.push(`<div class="cal-day ${d.getDate()===new Date(hoy).getDate()&&fStr===hoy?'today':''} ${otroMes?'otro-mes':''} ${totalDots>0?'tiene-datos':''}"
      onclick="abrirDia('${fStr}')">
      <div class="cal-day-num">${d.getDate()}</div>
      <div class="cal-dot-row">
        ${datos.cargas.length  ? `<div class="cal-dot cal-dot-carga" title="Carga"></div>` : ''}
        ${datos.tests.length   ? `<div class="cal-dot cal-dot-test" title="Tests"></div>` : ''}
        ${datos.gimnasio.length? `<div class="cal-dot cal-dot-gym" title="Gimnasio"></div>` : ''}
        ${datos.planes.length  ? `<div class="cal-dot cal-dot-plan" title="Planificado"></div>` : ''}
        ${datos.notas.length   ? `<div class="cal-dot cal-dot-nota" title="Nota"></div>` : ''}
      </div>
    </div>`);
  }
  return `<div class="cal-grid">
    ${dow.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
    ${celdas.join('')}
  </div>`;
}
function renderCalSemana(semIni, catFiltro){
  const hoy = diaStr(new Date());
  const dow = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const dias = Array.from({length:7},(_,i)=>{ const d=new Date(semIni); d.setDate(d.getDate()+i); return d; });
  const heads = dias.map((d,i)=>{
    const fStr=diaStr(d);
    return `<div class="cal-week-col"><div class="cal-week-day-head ${fStr===hoy?'today':''}" onclick="abrirDia('${fStr}')">
      ${dow[i]}<br><span style="font-size:14px;font-weight:700;">${d.getDate()}</span>
    </div>`;
  });
  const tiposEvento = [
    {key:'cargas',   cls:'cal-ev-carga', label: d=>{ const j=state.jugadoras.find(x=>x.id===d.jugadoraId); return (j?j.nombre.split(' ')[0]:'?')+' RPE '+d.rpe; }},
    {key:'tests',    cls:'cal-ev-test',  label: d=>{ const j=state.jugadoras.find(x=>x.id===d.jugadoraId); return (j?j.nombre.split(' ')[0]:'?')+' '+tipoLabel(d); }},
    {key:'gimnasio', cls:'cal-ev-gym',   label: d=>{ const j=state.jugadoras.find(x=>x.id===d.jugadoraId); return (j?j.nombre.split(' ')[0]:'?')+' '+ejercicioLabel(d); }},
    {key:'planes',   cls:'cal-ev-plan',  label: d=>esc(d.titulo||'Sesión')},
    {key:'notas',    cls:'cal-ev-nota',  label: d=>esc((d.texto||'').slice(0,20))}
  ];
  const cells = dias.map((d,i)=>{
    const fStr=diaStr(d);
    const datos=datosDelDia(fStr, catFiltro);
    const eventos = tiposEvento.flatMap(t=>(datos[t.key]||[]).map(ev=>`<div class="cal-event ${t.cls}">${t.label(ev)}</div>`));
    return `<div class="cal-week-cell" onclick="abrirDia('${fStr}')">${eventos.join('')}</div>`;
  });
  const cols = heads.map((h,i)=>`${h}${cells[i]}</div>`);
  return `<div class="cal-week">
    <div>
      <div class="cal-week-day-head" style="color:transparent;">·</div>
      <div class="cal-week-cell" style="background:none;cursor:default;font-size:10px;color:var(--ink-faint);padding-top:8px;">Sesiones</div>
    </div>
    ${cols.join('')}
  </div>`;
}

/* ---------- Ver un día ---------- */
function abrirDia(fechaStr){
  const datos = datosDelDia(fechaStr, '');
  const fmtD  = fmtDate(fechaStr);
  const seccion = (titulo,items)=>items.length===0?'':`<div class="eyebrow" style="margin-top:12px;">${titulo}</div>${items}`;
  const cargasHTML = datos.cargas.map(c=>{
    const j=state.jugadoras.find(x=>x.id===c.jugadoraId);
    return `<div class="test-history-item"><span>${j?esc(j.nombre):'?'}</span><span>RPE ${c.rpe} · ${c.sueno}h sueño</span></div>`;
  }).join('');
  const testsHTML = datos.tests.map(t=>{
    const j=state.jugadoras.find(x=>x.id===t.jugadoraId);
    return `<div class="test-history-item"><span>${j?esc(j.nombre):'?'}</span><span>${esc(tipoLabel(t))} · ${esc(t.resultado)} ${esc(t.unidad||'')}</span></div>`;
  }).join('');
  const gymHTML = datos.gimnasio.map(g=>{
    const j=state.jugadoras.find(x=>x.id===g.jugadoraId);
    return `<div class="test-history-item"><span>${j?esc(j.nombre):'?'}</span><span>${esc(ejercicioLabel(g))} ${esc(g.peso)}kg</span></div>`;
  }).join('');
  const planesHTML = datos.planes.map(p=>{
    const cats = Array.isArray(p.categorias) && p.categorias.length>0 ? p.categorias.join(', ') : (p.categoria||'Todas');
    return `<div class="card card-row" style="margin-bottom:6px;">
      <div><div class="card-title">${esc(p.titulo||'Sesión planificada')}</div>
      <div class="card-sub">${esc(p.tipo||'')} · ${esc(cats)}${p.desc?' — '+esc(p.desc.slice(0,40)):''}</div></div>
      <div style="display:flex;gap:4px;">
        <button class="btn btn-sm btn-ghost" onclick="closeModal(); openPlanForm('${fechaStr}','${p.id}')">&#9998;</button>
        <button class="btn btn-sm btn-ghost" onclick="eliminarPlan('${p.id}')">&#128465;</button>
      </div>
    </div>`;
  }).join('');
  const notasHTML = datos.notas.map(n=>`
    <div class="card card-row" style="margin-bottom:6px;">
      <div><div class="card-sub">${esc(n.texto||'')}</div></div>
      <button class="btn btn-sm btn-ghost" onclick="eliminarNota('${n.id}')">&#128465;</button>
    </div>`).join('');
  openModal(`
    <div class="modal-head"><h3>${fmtD}</h3><button class="close-x" onclick="closeModal()">&times;</button></div>
    ${seccion('Cargas registradas', cargasHTML)}
    ${seccion('Tests', testsHTML)}
    ${seccion('Gimnasio', gymHTML)}
    ${seccion('Planificado', planesHTML)}
    ${seccion('Notas del día', notasHTML)}
    ${datos.cargas.length+datos.tests.length+datos.gimnasio.length+datos.planes.length+datos.notas.length===0
      ? '<div class="empty" style="padding:20px 0;"><p style="color:var(--ink-faint);">Sin registros para este día.</p></div>' : ''}
    <div class="modal-actions" style="flex-wrap:wrap;gap:6px;">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-ghost" onclick="closeModal(); openNotaForm('${fechaStr}')">&#128221; Nota</button>
      <button class="btn btn-primary" onclick="closeModal(); openPlanForm('${fechaStr}')">&#43; Planificar</button>
    </div>
  `);
}

/* ---------- Planes ---------- */
function openPlanForm(fechaPreset, planId){
  const plan = planId ? state.planes.find(p=>p.id===planId) : null;
  const cats = [...new Set(state.jugadoras.map(j=>j.categoria).filter(Boolean))].sort();
  const selCats = plan ? (Array.isArray(plan.categorias) ? plan.categorias : (plan.categoria?[plan.categoria]:[])) : [];
  const catSelector = cats.length===0
    ? `<div class="hint">No hay categorías cargadas todavía.</div>`
    : `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="planCat_todas" ${selCats.length===0?'checked':''} onchange="toggleTodasCats(this)">
          <span>Todas</span>
        </label>
        ${cats.map(c=>`<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;">
          <input type="checkbox" class="planCatCk" value="${esc(c)}" ${selCats.includes(c)?'checked':''} onchange="document.getElementById('planCat_todas').checked=false;">
          <span>${esc(c)}</span>
        </label>`).join('')}
      </div>`;
  openModal(`
    <div class="modal-head"><h3>${plan?'Editar sesión':'Agregar sesión planificada'}</h3><button class="close-x" onclick="closeModal()">&times;</button></div>
    <div class="field"><label>Fecha</label><input type="date" id="planFecha" value="${plan?plan.fecha:(fechaPreset||todayStr())}"></div>
    <div class="field"><label>Título de la sesión</label><input id="planTitulo" value="${plan?esc(plan.titulo||''):''}" placeholder="Ej: Test de velocidad, Fuerza piernas..."></div>
    <div class="field"><label>Tipo</label>
      <select id="planTipo">
        <option value="test" ${plan&&plan.tipo==='test'?'selected':''}>Tests</option>
        <option value="gimnasio" ${plan&&plan.tipo==='gimnasio'?'selected':''}>Gimnasio</option>
        <option value="carga" ${plan&&plan.tipo==='carga'?'selected':''}>Sesión de carga</option>
        <option value="evaluacion" ${plan&&plan.tipo==='evaluacion'?'selected':''}>Evaluación física</option>
        <option value="otro" ${plan&&plan.tipo==='otro'?'selected':''}>Otro</option>
      </select>
    </div>
    <div class="field"><label>Divisiones / categorías</label>
      ${catSelector}
    </div>
    <div class="field"><label>Descripción / detalles</label>
      <textarea id="planDesc" placeholder="Ejercicios, objetivos, observaciones...">${plan?esc(plan.desc||''):''}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitPlan('${planId||''}')">Guardar</button>
    </div>
  `);
}
function toggleTodasCats(el){
  if(el.checked) document.querySelectorAll('.planCatCk').forEach(c=>c.checked=false);
}
function submitPlan(editId){
  const titulo = document.getElementById('planTitulo').value.trim();
  if(!titulo){ showToast('Escribí el título'); return; }
  const todasChecked = document.getElementById('planCat_todas')?.checked;
  const categorias = todasChecked ? []
    : Array.from(document.querySelectorAll('.planCatCk:checked')).map(c=>c.value);
  const data = {
    fecha: document.getElementById('planFecha').value || todayStr(),
    titulo,
    tipo: document.getElementById('planTipo').value,
    categorias,
    categoria: categorias.length===1 ? categorias[0] : (categorias.length===0?'':'varias'),
    desc: document.getElementById('planDesc').value.trim()
  };
  if(editId){
    const p = state.planes.find(x=>x.id===editId);
    if(p) Object.assign(p, data);
  } else {
    state.planes.push({ id: uid(), ...data });
  }
  savePlanes(); closeModal(); render();
  showToast('Sesión planificada guardada');
}
function eliminarPlan(id){
  if(!confirm('¿Eliminar esta sesión planificada?')) return;
  state.planes = state.planes.filter(p=>p.id!==id);
  savePlanes(); closeModal(); render();
}

/* ---------- Notas de sesión ---------- */
function openNotaForm(fechaPreset){
  openModal(`
    <div class="modal-head"><h3>Nota del día</h3><button class="close-x" onclick="closeModal()">&times;</button></div>
    <div class="field"><label>Fecha</label><input type="date" id="notaFecha" value="${fechaPreset||todayStr()}"></div>
    <div class="field"><label>Nota</label>
      <textarea id="notaTexto" placeholder="Ej: La categoría Primera llegó cansada, se redujo la carga. Juan mostró molestias en rodilla derecha..." style="min-height:100px;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitNota()">Guardar</button>
    </div>
  `);
}
function submitNota(){
  const texto = document.getElementById('notaTexto').value.trim();
  if(!texto){ showToast('Escribí algo en la nota'); return; }
  state.notas.push({
    id: uid(),
    fecha: document.getElementById('notaFecha').value || todayStr(),
    texto
  });
  saveNotas(); closeModal(); render();
  showToast('Nota guardada');
}
function eliminarNota(id){
  if(!confirm('¿Eliminar esta nota?')) return;
  state.notas = state.notas.filter(n=>n.id!==id);
  saveNotas(); closeModal(); render();
}

/* ---------------- Comparación entre jugadoras ---------------- */
function openComparacion(){
  const sorted = [...state.jugadoras].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  if(sorted.length<2){ showToast('Necesitás al menos 2 jugadoras para comparar'); return; }
  const sel1 = state._cmpJ1 || sorted[0].id;
  const sel2 = state._cmpJ2 || (sorted[1]?.id||'');
  const opciones = (selId)=>sorted.map(j=>`<option value="${j.id}" ${j.id===selId?'selected':''}>${esc(j.nombre)}</option>`).join('');
  openModal(`
    <div class="modal-head"><h3>Comparar jugadoras</h3><button class="close-x" onclick="closeModal()">&times;</button></div>
    <div class="field-row">
      <div class="field"><label>Jugadora A</label><select id="cmpJ1" onchange="state._cmpJ1=this.value; renderComparacion();">${opciones(sel1)}</select></div>
      <div class="field"><label>Jugadora B</label><select id="cmpJ2" onchange="state._cmpJ2=this.value; renderComparacion();">${opciones(sel2)}</select></div>
    </div>
    <div id="cmpBody"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>

}
function renderComparacion(){
  const id1 = document.getElementById('cmpJ1')?.value;
  const id2 = document.getElementById('cmpJ2')?.value;
  const el  = document.getElementById('cmpBody');
  if(!el || !id1 || !id2 || id1===id2){ if(el) el.innerHTML='<div class="hint">Elegí dos jugadoras distintas.</div>'; return; }
  const j1 = state.jugadoras.find(x=>x.id===id1);
  const j2 = state.jugadoras.find(x=>x.id===id2);
  const d1 = analizarJugadora(id1);
  const d2 = analizarJugadora(id2);
  const pr1 = mejoresMarcas(id1);
  const pr2 = mejoresMarcas(id2);
  const rpe1 = promedioReciente(id1,'rpe',7);
  const rpe2 = promedioReciente(id2,'rpe',7);
  const sue1 = promedioReciente(id1,'sueno',7);
  const sue2 = promedioReciente(id2,'sueno',7);
  const imc1 = calcularIMC(j1?.peso, j1?.altura);
  const imc2 = calcularIMC(j2?.peso, j2?.altura);
  const fila = (label, v1, v2, chip1, chip2)=>`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:5px 0;border-bottom:1px solid var(--border);align-items:center;">
      <div style="font-size:12px;font-weight:600;color:var(--ink-muted);">${esc(label)}</div>
      <div style="font-size:12px;text-align:center;">${chip1||esc(v1||'—')}</div>
      <div style="font-size:12px;text-align:center;">${chip2||esc(v2||'—')}</div>
    </div>`;
  const headerFila = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:5px 0;border-bottom:2px solid var(--border);">
      <div></div>
      <div style="font-size:12px;font-weight:700;text-align:center;color:var(--primary);">${esc(j1.nombre.split(' ')[0])}</div>
      <div style="font-size:12px;font-weight:700;text-align:center;color:var(--primary);">${esc(j2.nombre.split(' ')[0])}</div>
    </div>`;
  const domFilas = d1.map((dom,i)=>{
    const dom2 = d2[i];
    const c1 = dom.sinDatos ? null : dom.clasif;
    const c2 = dom2.sinDatos ? null : dom2.clasif;
    return fila(dom.label,
      dom.valorMostrado, dom2.valorMostrado,
      c1 ? `<span class="chip ${c1.cls}" style="font-size:11px;">${esc(c1.label)}</span>` : '<span class="chip muted" style="font-size:11px;">Sin datos</span>',
      c2 ? `<span class="chip ${c2.cls}" style="font-size:11px;">${esc(c2.label)}</span>` : '<span class="chip muted" style="font-size:11px;">Sin datos</span>'
    );
  }).join('');
  el.innerHTML = `
    <div style="margin-top:10px;">
      ${headerFila}
      ${fila('IMC', imc1?imc1.toFixed(1):'—', imc2?imc2.toFixed(1):'—')}
      ${domFilas}
      ${fila('RPE prom. 7d', rpe1?rpe1.promedio.toFixed(1)+'/10':'—', rpe2?rpe2.promedio.toFixed(1)+'/10':'—')}
      ${fila('Sueño prom. 7d', sue1?sue1.promedio.toFixed(1)+' h':'—', sue2?sue2.promedio.toFixed(1)+' h':'—')}
    </div>
    <div class="eyebrow" style="margin-top:12px;">Mejores marcas gimnasio</div>
    <div style="margin-top:6px;">
      ${headerFila}
      ${(()=>{
        const todos = [...new Set([...pr1,...pr2].map(p=>p.ejercicio))].sort();
        return todos.slice(0,8).map(ej=>{
          const m1 = pr1.find(p=>p.ejercicio===ej);
          const m2 = pr2.find(p=>p.ejercicio===ej);
          return fila(ej, m1?m1.peso+' kg':'—', m2?m2.peso+' kg':'—');
        }).join('');
      })()}
    </div>
  `;
}

function exportCSV(tipo){

      .concat(state.cargas.map(c=>[jugadoraNombre(c.jugadoraId), c.fecha, c.rpe, c.sueno, c.dolor, c.notas]));

      .concat(state.gimnasio.map(g=>[jugadoraNombre(g.jugadoraId), ejercicioLabel(g), g.fecha, g.peso, g.series, g.reps, g.rpe, g.notas]));
  } else {
    rows = [['Jugadora','Tipo de test','Fecha','Resultado','Unidad','Clasificación','Notas']]
      .concat(state.evaluaciones.map(t=>[jugadoraNombre(t.jugadoraId), tipoLabel(t), t.fecha, t.resultado, t.unidad, clasifTexto(t), t.notas]));
  }
  downloadFile(`${tipo}_${todayStr()}.csv`, toCSV(rows), 'text/csv;charset=utf-8;');

function exportExcel(){
  const wb = XLSX.utils.book_new();
  const wsJ = XLSX.utils.json_to_sheet(state.jugadoras.map(j=>({
    Nombre:j.nombre, Categoria:j.categoria, Edad:j.edad, Club:j.club, Contacto:j.contacto
  })));
  const wsC = XLSX.utils.json_to_sheet(state.cargas.map(c=>({
    Jugadora:jugadoraNombre(c.jugadoraId), Fecha:c.fecha, RPE:c.rpe, 'Horas sueño':c.sueno, 'Dolor muscular':c.dolor, Notas:c.notas
  })));
  const wsE = XLSX.utils.json_to_sheet(state.evaluaciones.map(t=>({
    Jugadora:jugadoraNombre(t.jugadoraId), Test:tipoLabel(t), Fecha:t.fecha, Resultado:t.resultado, Unidad:t.unidad, Clasificación:clasifTexto(t), Notas:t.notas
  })));
  const wsG = XLSX.utils.json_to_sheet(state.gimnasio.map(g=>({
    Jugadora:jugadoraNombre(g.jugadoraId), Ejercicio:ejercicioLabel(g), Fecha:g.fecha, 'Peso (kg)':g.peso, Series:g.series, Repeticiones:g.reps, RPE:g.rpe, Notas:g.notas
  })));
  XLSX.utils.book_append_sheet(wb, wsJ, 'Jugadoras');
  XLSX.utils.book_append_sheet(wb, wsC, 'Carga diaria');
  XLSX.utils.book_append_sheet(wb, wsE, 'Evaluaciones');
  XLSX.utils.book_append_sheet(wb, wsG, 'Gimnasio');

  // Hoja de progresión de gimnasio: una matriz por jugadora (fecha x ejercicio)
  const progRows = [];
  state.jugadoras.forEach(j=>{
    const registros = state.gimnasio.filter(g=>g.jugadoraId===j.id);
    if(registros.length===0) return;
    const ejercicios = [...new Set(registros.map(ejercicioLabel))].sort();
    const fechas = [...new Set(registros.map(g=>g.fecha))].sort();
    const matriz = {};
    registros.forEach(g=>{
      const ej = ejercicioLabel(g), f = g.fecha, p = parseNum(g.peso)||0;
      matriz[f] = matriz[f] || {};
      if(matriz[f][ej]===undefined || p>matriz[f][ej]) matriz[f][ej] = p;
    });
    progRows.push({ Jugadora:j.nombre });
    progRows.push(Object.assign({ Fecha:'Fecha' }, ...ejercicios.map(e=>({[e]:e}))));
    fechas.forEach(f=>{
      const row = { Fecha:f };
      ejercicios.forEach(e=>{ row[e] = matriz[f][e]!==undefined ? matriz[f][e] : ''; });
      progRows.push(row);
    });
    progRows.push({});
  });
  if(progRows.length){
    const wsP = XLSX.utils.json_to_sheet(progRows, {skipHeader:true});
    XLSX.utils.book_append_sheet(wb, wsP, 'Progresión gimnasio');
  }

  XLSX.writeFile(wb, `preparador_fisico_${todayStr()}.xlsx`);
  showToast('Excel descargado');
}

/* ---------------- Carga compartida de Three.js + esfera de fondo ---------------- */
let threeJSLoaded = false;
let threeJSLoading = false;
let threeJSCallbacks = [];
function cargarThreeJS(cb){
  if(threeJSLoaded){ cb(); return; }
  threeJSCallbacks.push(cb);
  if(threeJSLoading) return;
  threeJSLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload = function(){ threeJSLoaded = true; threeJSCallbacks.forEach(f=>f()); threeJSCallbacks = []; };
  s.onerror = function(){ threeJSLoading = false; };
  document.head.appendChild(s);
}
function iniciarFondoEsfera3D(containerId){
  cargarThreeJS(function(){
    const container = document.getElementById(containerId);
    if(!container) return;
    const alto = container.clientHeight || 260;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth/alto, 0.1, 100);
    camera.position.set(0,0,7);
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(container.clientWidth, alto);
    renderer.setPixelRatio(window.devicePixelRatio||1);
    container.appendChild(renderer.domElement);
    const esferaExt = new THREE.Mesh(
      new THREE.SphereGeometry(2.3, 24, 16),
      new THREE.MeshBasicMaterial({color:0xC9E265, wireframe:true, transparent:true, opacity:0.5})
    );
    scene.add(esferaExt);
    const esferaInt = new THREE.Mesh(
      new THREE.SphereGeometry(1.3, 16, 12),
      new THREE.MeshBasicMaterial({color:0xC9E265, wireframe:true, transparent:true, opacity:0.28})
    );
    scene.add(esferaInt);
    function animate(){
      if(!container.isConnected) return;
      requestAnimationFrame(animate);
      esferaExt.rotation.y += 0.003;
      esferaExt.rotation.x += 0.0012;
      esferaInt.rotation.y -= 0.005;
      renderer.render(scene, camera);
    }
    animate();
    function onResize(){
      if(!container.isConnected){ window.removeEventListener('resize', onResize); return; }
      const h = container.clientHeight || 260;
      camera.aspect = container.clientWidth / h;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, h);
    }
    window.addEventListener('resize', onResize);
  });
}

function runSplash3D(){
  try{
    const container = document.getElementById('splash3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, container.clientWidth/container.clientHeight, 0.1, 100);
    camera.position.set(0,0,9);
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio||1);
    container.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const dir1 = new THREE.DirectionalLight(0xffffff, 1.1); dir1.position.set(4,6,5); scene.add(dir1);
    const dir2 = new THREE.DirectionalLight(0xC9E265, 0.5); dir2.position.set(-4,-2,3); scene.add(dir2);
    const group = new THREE.Group(); scene.add(group);
    const knotMat = new THREE.MeshStandardMaterial({color:0x153F2B, roughness:0.4, metalness:0.3});
    const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(1.4, 0.42, 120, 20, 2, 3), knotMat);
    group.add(knot);
    const start = performance.now();
    function animate(){
      const raf = requestAnimationFrame(animate);
      group.rotation.y += 0.025;
      group.rotation.x += 0.01;
      renderer.render(scene, camera);
      if(performance.now() - start > 1500){ cancelAnimationFrame(raf); hideSplash(); }
    }
    animate();
  }catch(e){ console.error('Error en splash 3D', e); hideSplash(); }
}
function hideSplash(){
  const splash = document.getElementById('splashScreen');
  if(!splash) return;
  splash.style.opacity = '0';
  setTimeout(()=>{ splash.style.display = 'none'; }, 500);
  try{ sessionStorage.setItem('pf_splash_shown', '1'); }catch(e){}
}

/* ---------------- Init ---------------- */
tryInitFirebase();
render();
maybeShowSplash();

/* ---------------- Cursor personalizado (punto con glow) ---------------- */
(function(){
  const cursor = document.getElementById('customCursor');
  if(!cursor) return;
  let mx=0, my=0, cx=0, cy=0;
  document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });
  function loop(){
    cx += (mx-cx)*0.22;
    cy += (my-cy)*0.22;
    cursor.style.left = cx+'px';
    cursor.style.top  = cy+'px';
    requestAnimationFrame(loop);
  }
  loop();
  document.addEventListener('mousedown', ()=>cursor.classList.add('clicking'));
  document.addEventListener('mouseup',   ()=>cursor.classList.remove('clicking'));
  document.addEventListener('mouseover', e=>{
    const t = e.target;
    if(t.matches('button,a,[onclick],select,.hub-card,.test-chip,.tab,.card,.sport-card,.btn')){
      cursor.classList.add('on-interactive');
    } else {
      cursor.classList.remove('on-interactive');
    }
  });
})();
